<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中东历史时间线 · 三维度可视化</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,50&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9932A;--gold-l:#E8B84B;--sand:#F2E4C4;--parchment:#F9F0DC;--ink:#1C1008;--wb:#1A3A5C;--wbl:#2E6A9E;--wa:#4FA3D1;--div:rgba(201,147,42,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--sand);font-family:'Sora',sans-serif;overflow-x:hidden}
header{position:relative;text-align:center;padding:72px 20px 36px;overflow:hidden}
.ornament{display:inline-flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;color:#17385d;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.9;margin-bottom:18px;padding:8px 14px;border:1px solid rgba(23,56,93,.15);border-radius:999px;background:rgba(255,255,255,.68);backdrop-filter:blur(12px)}
header h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(2.5rem,8vw,6.4rem);color:#10253d;letter-spacing:-.04em;line-height:.94}
.gold-line{width:128px;height:8px;border-radius:999px;background:linear-gradient(90deg,#ff8e52,#f5c064,#86b5ff);margin:22px auto 0;opacity:.9}
/* ── Mode Switcher ── */
.mode-bar{display:flex;justify-content:center;gap:0;padding:14px 20px 0;background:rgba(28,16,8,.95);border-bottom:none}
.mode-btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;padding:9px 22px;border:1px solid var(--div);border-bottom:none;background:transparent;color:rgba(242,228,196,.45);cursor:pointer;transition:all .25s;text-transform:uppercase;position:relative;top:1px;border-radius:4px 4px 0 0}
.mode-btn:hover{color:var(--gold-l);background:rgba(201,147,42,.08)}
.mode-btn.active{background:rgba(28,16,8,.9);color:var(--gold-l);border-color:var(--gold);border-bottom-color:rgba(28,16,8,.9);z-index:201}

/* ── Sub-selector for country/conflict ── */
.sub-selector{display:none;justify-content:center;gap:6px;padding:10px 20px;background:rgba(28,16,8,.92);flex-wrap:wrap}
.sub-selector.open{display:flex}
.sub-btn{font-family:'Noto Serif SC',serif;font-size:11px;padding:5px 14px;border:1px solid rgba(201,147,42,.2);background:transparent;color:rgba(242,228,196,.5);cursor:pointer;transition:all .2s;border-radius:3px}
.sub-btn:hover{border-color:var(--gold);color:var(--gold-l)}
.sub-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* ── Overview Card ── */
.overview-card{display:none;max-width:1360px;margin:0 auto;padding:24px 32px;background:linear-gradient(135deg,rgba(201,147,42,.08),rgba(201,147,42,.03));border:1px solid var(--div);border-radius:4px;margin-top:16px;margin-bottom:8px}
.overview-card.open{display:block}
.overview-card h2{font-family:'Cinzel',serif;font-size:16px;color:var(--gold-l);letter-spacing:3px;margin-bottom:12px}
.overview-card .overview-body{font-size:13.5px;line-height:1.85;color:rgba(242,228,196,.78)}
.overview-card .overview-body h3{font-family:'Cinzel',serif;color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--div)}
.overview-card .overview-body p{margin-bottom:10px}
.overview-card .overview-body ul{margin:0 0 10px 18px}
.overview-card .overview-body li{margin-bottom:5px}
.overview-card .overview-body strong{color:var(--gold-l);font-weight:600}

/* ── Search Panel ── */
.search-shell{max-width:1180px;margin:0 auto 14px;padding:0 20px}
.search-panel{padding:18px 20px;background:rgba(255,250,242,.84);border:1px solid var(--edge);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
.search-input-wrap{display:flex;flex-direction:column;gap:8px}
.search-label{font-family:'Sora',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6b7280}
.search-input{width:100%;padding:15px 18px;border:1px solid rgba(18,38,63,.12);border-radius:18px;background:rgba(255,255,255,.9);font:500 15px/1.4 'Sora',sans-serif;color:var(--ink-2);outline:none;transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease}
.search-input:focus{border-color:rgba(79,124,255,.36);box-shadow:0 0 0 4px rgba(79,124,255,.12);transform:translateY(-1px)}
.search-input::placeholder{color:#8a93a2}
.search-hint{margin-top:10px;font-size:12px;line-height:1.6;color:#667085}
.search-results{display:grid;gap:10px;margin-top:16px}
.search-results[hidden]{display:none}
.search-result-btn{width:100%;display:block;text-align:left;padding:14px 16px;border:none;border-radius:18px;background:rgba(18,38,63,.05);cursor:pointer;transition:transform .18s ease, background .18s ease, box-shadow .18s ease}
.search-result-btn:hover,.search-result-btn.active{background:linear-gradient(135deg,rgba(255,127,77,.14),rgba(79,124,255,.16));box-shadow:0 14px 30px rgba(18,38,63,.1);transform:translateY(-1px)}
.search-result-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.search-result-kicker{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#6b7280}
.search-result-year{font-size:11px;color:#8a93a2;white-space:nowrap}
.search-result-title{margin-top:6px;font-family:'Fraunces',serif;font-size:24px;line-height:1.2;letter-spacing:-.03em;color:var(--ink-2)}
.search-result-meta{margin-top:8px;font-size:12px;line-height:1.6;color:#495567}
.search-result-lines{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.search-empty{padding:14px 16px;border-radius:18px;background:rgba(18,38,63,.04);font-size:13px;line-height:1.7;color:#667085}

/* ── Filter Bar ── */
.filter-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:14px 20px;background:rgba(28,16,8,.9);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.filter-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:6px 14px;border:1px solid var(--div);background:transparent;color:rgba(242,228,196,.55);cursor:pointer;transition:all .25s;text-transform:uppercase}
.filter-btn:hover,.filter-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* ── Column Headers ── */
.col-headers{display:grid;grid-template-columns:1fr 82px 1fr;max-width:1360px;margin:0 auto;padding:32px 24px 12px}
.col-label{text-align:center;padding:10px}.col-label.left{text-align:right;padding-right:28px}.col-label.right{text-align:left;padding-left:28px}
.col-label span{font-family:'Cinzel',serif;font-size:14px;letter-spacing:4px;text-transform:uppercase}
.col-label.left span{color:var(--gold)}.col-label.right span{color:var(--wa)}
.col-label small{display:block;font-size:10px;opacity:.45;letter-spacing:2px;margin-top:4px}

/* ── Timeline ── */
.timeline{max-width:1360px;margin:0 auto;padding:0 24px 96px;position:relative}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--gold) 0%,rgba(201,147,42,.25) 50%,var(--wbl) 100%);transform:translateX(-50%)}
.timeline[data-mode="country"],.timeline[data-mode="conflict"]{max-width:1120px}
.timeline[data-mode="country"]::before,.timeline[data-mode="conflict"]::before{display:none}
.era-section{position:relative;margin:22px 0;border:1px solid var(--div);background:linear-gradient(135deg,rgba(201,147,42,.06),rgba(10,5,2,.25));overflow:hidden}
.era-toggle{width:100%;display:block;position:relative;text-align:left;padding:20px 24px;border:none;background:transparent;color:inherit;cursor:pointer}
.era-toggle:hover{background:rgba(255,255,255,.03)}
.era-toggle-main{width:100%}
.era-toggle-label{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-l);margin-bottom:10px}
.era-toggle-summary{font-size:14px;line-height:1.8;color:rgba(242,228,196,.86);margin-bottom:10px}
.era-toggle-meta{font-size:11px;letter-spacing:.4px;color:rgba(242,228,196,.48)}
.era-toggle-state{position:absolute;top:24px;right:28px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(242,228,196,.65);white-space:nowrap}
.era-content{display:none;padding:0 18px 18px}
.era-content.open{display:block}
.event-row{display:grid;grid-template-columns:1fr 82px 1fr;align-items:start;margin-bottom:14px;opacity:0;animation:fadeUp .5s ease forwards;animation-play-state:paused}
.event-row.vis{animation-play-state:running}
.event-row.highlight-target .card-inner,.reading-card.highlight-target{box-shadow:0 0 0 2px rgba(255,127,77,.22),0 22px 46px rgba(79,124,255,.16)!important}
.event-row.highlight-target .card-inner{background:linear-gradient(135deg,rgba(255,127,77,.12),rgba(79,124,255,.12))!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── Event Cards ── */
.event-node{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:18px;position:relative;z-index:5}
.node-year{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold-l);letter-spacing:.8px;text-align:center;line-height:1.1}
.node-dot{width:18px;height:18px;border-radius:50%;background:var(--ink);border:3px solid var(--gold);flex-shrink:0;transition:transform .2s}
.node-dot:hover{transform:scale(1.4)}.node-dot.wo{border-color:var(--wbl)}.node-dot.both{border-color:var(--gold-l);background:radial-gradient(circle,var(--wb) 50%,var(--ink) 50%)}
.event-card{margin:8px 8px;cursor:pointer;transition:transform .2s}.event-card:hover{transform:scale(1.015)}
.card-inner{padding:16px 20px 14px;transition:background .2s}
.event-card.me .card-inner{text-align:right;border-right:3px solid var(--gold);border-top:1px solid rgba(201,147,42,.15);border-bottom:1px solid rgba(201,147,42,.15);background:linear-gradient(to left,rgba(201,147,42,.07),transparent)}
.event-card.we .card-inner{border-left:3px solid var(--wbl);border-top:1px solid rgba(46,106,158,.15);border-bottom:1px solid rgba(46,106,158,.15);background:linear-gradient(to right,rgba(46,106,158,.09),transparent)}
.event-card:hover .card-inner{background:rgba(255,255,255,.07)!important}
.card-tag{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.55;margin-bottom:6px}
.me .card-tag{color:var(--gold-l)}.we .card-tag{color:var(--wa)}
.card-title{font-weight:600;font-size:17px;line-height:1.45;margin-bottom:8px;color:var(--parchment)}
.card-meta{font-size:11px;line-height:1.45;color:rgba(201,147,42,.78);margin:-2px 0 8px;letter-spacing:.2px}
.card-desc{font-size:14px;line-height:1.75;color:rgba(242,228,196,.68)}
.card-actions{display:flex;gap:8px;margin-top:12px}
.me .card-actions{justify-content:flex-end}.we .card-actions{justify-content:flex-start}
.act-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:6px 12px;border:1px solid;background:transparent;cursor:pointer;transition:all .2s;text-transform:uppercase}
.act-btn.map-btn{border-color:rgba(201,147,42,.4);color:rgba(201,147,42,.7)}
.act-btn.map-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.act-btn.dtl-btn{border-color:rgba(79,163,209,.35);color:rgba(79,163,209,.7)}
.act-btn.dtl-btn:hover{background:var(--wa);color:var(--ink)}
.we .act-btn.map-btn{border-color:rgba(79,163,209,.4);color:rgba(79,163,209,.7)}
.we .act-btn.map-btn:hover{background:var(--wa);color:var(--ink)}
.we .act-btn.dtl-btn{border-color:rgba(201,147,42,.35);color:rgba(201,147,42,.7)}
.we .act-btn.dtl-btn:hover{background:var(--gold);color:var(--ink)}
.event-card.empty{cursor:default;pointer-events:none}

/* ── Line Badges ── */
.line-badges{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.me .line-badges{justify-content:flex-end}
.line-badge{font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:.5px;opacity:.7}
.line-badge.country{background:rgba(93,169,233,.15);color:#5DA9E9;border:1px solid rgba(93,169,233,.25)}
.line-badge.conflict{background:rgba(168,125,255,.15);color:#A87DFF;border:1px solid rgba(168,125,255,.25)}

.era-summary-grid{display:grid;grid-template-columns:minmax(0,1fr) 82px minmax(0,1fr);gap:0;align-items:stretch}
.era-summary-spacer{display:block;position:relative}
.era-summary-spacer::after{content:'';position:absolute;left:50%;top:12px;bottom:12px;width:1px;background:rgba(18,38,63,.08)}
.era-summary-card{padding:14px 16px;border-radius:18px;margin:0 8px}
.era-summary-card.me{justify-self:stretch}
.era-summary-card.world{justify-self:stretch}
.era-summary-card.me{background:rgba(255,127,77,.08)}
.era-summary-card.world{background:rgba(79,124,255,.08)}
.era-summary-card span{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.7;margin-bottom:8px}
.era-summary-card strong{display:block;font-size:15px;line-height:1.7}
.era-summary-card small{display:block;font-size:11px;opacity:.55;margin-top:8px}
.regional-inline-head{display:grid;grid-template-columns:1fr 82px 1fr;max-width:100%;padding:10px 8px 16px}
.regional-inline-label span{font-size:10px;letter-spacing:.18em;text-transform:uppercase}
.regional-inline-label.left{text-align:right;padding-right:28px}
.regional-inline-label.right{text-align:left;padding-left:28px}

.country-map-shell{width:min(100%,1160px);margin:0 auto;display:grid;grid-template-columns:minmax(0,1.5fr) 280px;gap:18px;align-items:start}
.country-map-stage{height:500px;width:100%;border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}
.country-map-list{display:grid;gap:8px;max-height:500px;overflow:auto;padding:4px}
.country-list-btn{border:none;background:rgba(255,250,242,.88);color:#13253d;padding:13px 14px;border-radius:18px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;text-align:left;cursor:pointer;box-shadow:0 8px 24px rgba(18,38,63,.08)}
.country-list-btn.active{background:linear-gradient(135deg,#14253f,#2c5686);color:#fff}

/* ── Reading Mode ── */
.reading-list{display:grid;gap:16px}
.reading-card{border:1px solid rgba(201,147,42,.18);background:linear-gradient(145deg,rgba(32,16,7,.92),rgba(16,8,3,.94));padding:20px 22px}
.reading-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
.reading-kicker{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,147,42,.78);margin-bottom:8px}
.reading-card h3{font-size:20px;line-height:1.4;color:var(--parchment)}
.reading-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.reading-desc{font-size:14px;line-height:1.85;color:rgba(242,228,196,.82);margin-top:14px}
.reading-reason,.reading-bridge,.reading-aside,.reading-fact{margin-top:12px;font-size:13px;line-height:1.8}
.reading-reason{color:rgba(232,184,75,.9)}
.reading-bridge{padding:10px 12px;border-left:3px solid rgba(201,147,42,.55);background:rgba(201,147,42,.08);color:rgba(242,228,196,.74)}
.reading-aside{padding-top:10px;border-top:1px solid rgba(201,147,42,.15);color:rgba(242,228,196,.6)}
.reading-fact{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:rgba(79,163,209,.9)}

.empty-state{max-width:980px;margin:28px auto;padding:30px 32px;border:1px dashed var(--div);background:rgba(201,147,42,.05);text-align:center}
.empty-state h3{font-family:'Cinzel',serif;font-size:18px;letter-spacing:3px;color:var(--gold-l);margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.8;color:rgba(242,228,196,.72)}

/* ── Map Modal ── */
#mapModal{position:fixed;inset:0;z-index:1000;display:none;align-items:stretch;justify-content:stretch;padding:16px;background:rgba(5,3,1,.72);backdrop-filter:blur(4px)}
#mapModal.open{display:flex}
#mapPanel{display:flex;flex-direction:column;flex:1;min-height:0;border:1px solid var(--div);background:rgba(10,5,2,.97)}
#mapHeader{padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--div);flex-shrink:0;background:rgba(10,5,2,.97)}
#mapTitle{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--gold-l)}
#mapSubtitle{font-size:11px;color:rgba(242,228,196,.45);margin-top:2px;font-style:italic}
.modal-close{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;padding:6px 16px;border:1px solid var(--div);background:transparent;color:var(--sand);cursor:pointer;transition:all .2s}
.modal-close:hover{background:#7A1F1F;border-color:#7A1F1F}
#mapWrap{flex:1;position:relative;min-height:0}
#theMap{width:100%;height:100%}
#mapLegend{position:absolute;bottom:20px;left:20px;background:rgba(10,5,2,.88);border:1px solid var(--div);padding:12px 16px;z-index:900;max-width:280px;pointer-events:none}
#mapLegend h4{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px;color:rgba(242,228,196,.8)}
.leg-swatch{width:16px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Detail Modal ── */
#detailModal{position:fixed;inset:0;z-index:1001;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(5,3,1,.72);backdrop-filter:blur(6px)}
#detailModal.open{display:flex}
#detailPanel{width:min(980px,100%);max-height:min(86vh,980px);background:linear-gradient(160deg,#1e0e05 0%,#120903 100%);border:1px solid var(--div);overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.45);animation:detailPop .24s ease}
@keyframes detailPop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
#detailHead{padding:24px 28px 18px;border-bottom:1px solid var(--div);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(201,147,42,.08),rgba(201,147,42,.02))}
#detailMeta{flex:1}
#detailTag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
#detailHeadTitle{font-family:'Cinzel',serif;font-size:24px;color:var(--gold-l);line-height:1.3}
#detailYear{font-size:11px;color:rgba(242,228,196,.4);margin-top:5px;font-style:italic}
#detailBody{padding:28px 30px 34px;flex:1;line-height:1.95;font-size:15px;color:rgba(242,228,196,.88)}
#detailBody h3{font-family:'Cinzel',serif;color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--div)}
#detailBody h3:first-child{margin-top:0}
#detailBody p{margin-bottom:13px}
#detailBody ul{margin:0 0 13px 18px}
#detailBody li{margin-bottom:7px}
#detailBody strong{color:var(--gold-l);font-weight:600}
.detail-jumps{display:grid;gap:12px;margin-top:28px;padding-top:22px;border-top:1px solid rgba(18,38,63,.12)}
.detail-jump-card{padding:16px 18px;border-radius:20px;background:rgba(18,38,63,.05)}
.detail-jump-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#6b7280}
.detail-jump-copy{margin-top:8px;font-size:14px;line-height:1.8;color:#425061}
.detail-jump-link{margin-top:12px;display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border:none;border-radius:999px;background:rgba(79,124,255,.14);color:#21476f;font:600 12px/1 'Sora',sans-serif;cursor:pointer;transition:background .18s ease,color .18s ease,transform .18s ease}
.detail-jump-link:hover{background:#4f7cff;color:#fff;transform:translateY(-1px)}
body.detail-open header,
body.detail-open .mode-bar,
body.detail-open .sub-selector,
body.detail-open .overview-card,
body.detail-open .search-shell,
body.detail-open .filter-bar,
body.detail-open .col-headers,
body.detail-open .timeline,
body.detail-open .legend{filter:blur(1px);opacity:.34;transition:opacity .2s ease}

/* ── Legend ── */
.legend{display:flex;justify-content:center;gap:26px;padding:18px;border-top:1px solid var(--div);font-size:10px;color:rgba(242,228,196,.45);letter-spacing:1px}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-dot{width:9px;height:9px;border-radius:50%;border:2px solid}
.legend-dot.me{border-color:var(--gold)}.legend-dot.wo{border-color:var(--wa)}

/* ── Scrollbar & Leaflet ── */

/* ── v7 Modern Theme Overrides ── */
:root{
  --bg:#f6f1e8;
  --surface:#fffaf2;
  --surface-2:#f1e6d3;
  --ink-2:#12263f;
  --muted:#5e6775;
  --accent:#ff7f4d;
  --accent-2:#f1c05e;
  --accent-3:#4f7cff;
  --edge:rgba(18,38,63,.12);
  --shadow:0 24px 80px rgba(18,38,63,.10);
}
body{
  background:
    radial-gradient(circle at top left, rgba(255,172,116,.28), transparent 28%),
    radial-gradient(circle at top right, rgba(79,124,255,.14), transparent 26%),
    linear-gradient(180deg, #fbf7f1 0%, #f4ede0 100%);
  color:var(--ink-2);
}
header::before,header::after{
  content:'';
  position:absolute;
  border-radius:50%;
  filter:blur(2px);
  z-index:-1;
}
header::before{
  width:320px;height:320px;left:-90px;top:-120px;
  background:radial-gradient(circle, rgba(255,127,77,.22) 0%, rgba(255,127,77,0) 72%);
}
header::after{
  width:360px;height:360px;right:-120px;top:-100px;
  background:radial-gradient(circle, rgba(79,124,255,.18) 0%, rgba(79,124,255,0) 72%);
}
.mode-bar,.sub-selector,.filter-bar{
  max-width:1180px;
  margin:0 auto;
  border:none;
  background:transparent;
}
.mode-bar{padding:12px 20px 0}
.sub-selector{padding:8px 20px 0}
.filter-bar{
  top:12px;
  margin-top:8px;
  margin-bottom:16px;
  padding:0 6px;
  border:none;
  border-radius:0;
  background:transparent;
  box-shadow:none;
}
.mode-btn,.filter-btn,.sub-btn,.act-btn,.modal-close{

}
.mode-btn{
  top:0;

  border-radius:999px;

  letter-spacing:.08em;

  color:var(--muted);
  backdrop-filter:blur(12px);
}
.mode-btn.active{
  background:linear-gradient(135deg,var(--ink-2),#21476f);

  box-shadow:0 18px 32px rgba(18,38,63,.22);
}
.sub-btn,.filter-btn{
  border:none;
  border-radius:999px;
  background:rgba(18,38,63,.06);
  color:var(--muted);

  letter-spacing:.02em;
  text-transform:none;
}
.sub-btn.active,.filter-btn.active,
.sub-btn:hover,.filter-btn:hover{
  background:linear-gradient(135deg,rgba(255,127,77,.18),rgba(79,124,255,.14));

}
.overview-card{

}
.overview-card h2{

}

}
.overview-card .overview-body h3{

}
.col-headers{display:none!important}
.col-label span{

}
.timeline{
  max-width:1180px;

}
.timeline::before{

.era-section{

}
.era-toggle{padding:24px 28px}
.era-toggle-label{

.era-toggle-summary{

.era-toggle-meta,.era-toggle-state{color:#6f7888}
.era-content{padding:0 20px 20px}
.event-card{margin:10px 10px 14px}
.card-inner{

}
.event-card.me .card-inner{text-align:left}
.card-tag,.me .card-tag,.we .card-tag{

  font-size:10px;
  letter-spacing:.18em;
}
.card-title{

}
.card-desc{color:#465061;font-size:13px;line-height:1.8}
.card-meta{color:#b55a38}
.node-year{
  color:#6b7280;
  font-family:'Sora',sans-serif;
  font-size:10px;
  letter-spacing:.08em;
}
.node-dot{
  width:20px;height:20px;border:4px solid #fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-3));
  box-shadow:0 0 0 1px rgba(18,38,63,.08),0 10px 22px rgba(79,124,255,.22);
}
.node-dot.wo{background:linear-gradient(135deg,#7cc4ff,#4f7cff)}
.node-dot.both{background:linear-gradient(135deg,#ff8a57,#4f7cff)}
.act-btn{
  border:none;
  border-radius:999px;
  padding:9px 13px;
  font-size:10px;
  letter-spacing:.08em;
  font-weight:600;
}
.act-btn.map-btn{
  background:rgba(241,192,94,.20);
  color:#6f4c00;
}
.act-btn.map-btn:hover{
  background:#f1c05e;
  color:#352400;
}
.act-btn.dtl-btn{
  background:rgba(79,124,255,.16);
  color:#21476f;
}
.act-btn.dtl-btn:hover{
  background:#4f7cff;
  color:#fff;
}
.line-badge{
  border:none!important;
  border-radius:999px;
  padding:4px 9px;
  opacity:1;
  font-family:'Sora',sans-serif;
}
.line-badge.country{background:rgba(79,124,255,.12);color:#2f5ea7}
.line-badge.conflict{background:rgba(255,127,77,.14);color:#b35635}
.reading-card{
  border:none;
  border-radius:28px;
  background:linear-gradient(145deg,rgba(255,255,255,.94),rgba(251,246,238,.98));
  box-shadow:0 18px 48px rgba(18,38,63,.09);
}
.reading-kicker{
  font-family:'Sora',sans-serif;
  color:#6b7280;
  letter-spacing:.18em;
}
.reading-card h3{
  font-family:'Fraunces',serif;
  color:var(--ink-2);
  font-size:32px;
  letter-spacing:-.04em;
}
.reading-desc{color:#425061}
.reading-reason{
  color:#a34d30;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(255,127,77,.08);
}
.reading-bridge{
  background:rgba(79,124,255,.08);
  border-left:none;
  border-radius:18px;
  color:#31445f;
}
.reading-aside{
  border-top:none;
  border-radius:18px;
  padding:12px 14px;
  background:rgba(18,38,63,.05);
}
.reading-fact{
  color:#2f5ea7;
  font-family:'Sora',sans-serif;
}
.legend{
  color:#758093;
  border-top:none;
}
.empty-state{
  border:none;
  border-radius:28px;
  background:rgba(255,250,242,.82);
  box-shadow:var(--shadow);
}
.empty-state h3{
  font-family:'Fraunces',serif;
  color:var(--ink-2);
  letter-spacing:-.03em;
}
#mapModal{
  background:rgba(17,28,45,.24);
  backdrop-filter:blur(10px);
}
#mapPanel{
  border:none;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 28px 80px rgba(18,38,63,.22);
}
#mapHeader{
  background:rgba(255,250,242,.92);
  border-bottom:1px solid var(--edge);
}
#mapTitle{
  font-family:'Fraunces',serif;
  color:var(--ink-2);
  font-size:26px;
  letter-spacing:-.03em;
}
#mapSubtitle{color:#6f7888}
.modal-close{
  border:none;
  border-radius:999px;
  background:rgba(18,38,63,.08);
  color:var(--ink-2);
}
.modal-close:hover{
  background:var(--ink-2);
  color:#fff;
}
#detailModal{
  background:rgba(17,28,45,.24);
  backdrop-filter:blur(14px);
}
#detailPanel{
  background:linear-gradient(180deg,rgba(255,252,246,.98),rgba(245,238,226,.98));
  border:none;
  border-radius:30px;
  color:var(--ink-2);
}
#detailHead{
  background:linear-gradient(135deg,rgba(255,127,77,.08),rgba(79,124,255,.08));
  border-bottom:1px solid var(--edge);
}
#detailTag{
  font-family:'Sora',sans-serif;
  color:#6b7280;
}
#detailHeadTitle{
  font-family:'Fraunces',serif;
  color:var(--ink-2);
  font-size:36px;
  letter-spacing:-.04em;
}
#detailYear{color:#6f7888}
#detailBody{
  color:#334155;
  font-family:'Sora',sans-serif;
}
#detailBody h3{
  font-family:'Sora',sans-serif;
  color:#b35635;
  border-bottom:none;
  letter-spacing:.18em;
  font-size:10px;
}
#detailBody strong{color:#10253d}
body.detail-open header,
body.detail-open .mode-bar,
body.detail-open .sub-selector,
body.detail-open .overview-card,
body.detail-open .filter-bar,
body.detail-open .col-headers,
body.detail-open .timeline,
body.detail-open .legend{
  filter:none;
  opacity:.18;
}

/* ── Responsive ── */
@media(max-width:600px){
  #mapModal{padding:8px}
  .mode-bar{gap:0;padding:10px 10px 0}.mode-btn{font-size:9px;padding:7px 12px;letter-spacing:1px}
  .sub-selector{padding:8px 10px;gap:4px}.sub-btn{font-size:10px;padding:4px 10px}
  .col-headers{grid-template-columns:1fr 38px 1fr;padding:20px 12px 8px}
  .col-label{padding:8px 0}.col-label.left{padding-right:12px}.col-label.right{padding-left:12px}
  .col-label span{font-size:10px;letter-spacing:3px}
  .timeline{padding:0 12px 64px}
  .event-row{grid-template-columns:minmax(0,1fr) 38px minmax(0,1fr)}
  .event-node{padding-top:10px}.node-year{font-size:8px}
  .event-card{margin:4px 2px}.card-inner{padding:10px 10px 8px}
  .card-title{font-size:11px}.card-desc{font-size:10px;line-height:1.45}
  .card-actions{gap:4px;flex-wrap:wrap}.act-btn{font-size:8px;padding:4px 8px}
  .overview-card{padding:16px;margin:8px 12px}
  .search-shell{padding:0 12px}
  .search-panel{padding:15px 16px;border-radius:20px}
  .search-input{padding:13px 15px;font-size:14px}
  .search-result-btn{padding:13px 14px}
  .search-result-title{font-size:20px}
  .era-toggle{padding:16px}
  .era-toggle-state{position:static;display:block;margin-top:12px}
  .era-toggle-label{padding-right:0}
  .era-summary-grid{grid-template-columns:1fr}
  .era-summary-spacer{display:none}
  .regional-inline-head{grid-template-columns:1fr 38px 1fr}
  .reading-card{padding:16px}
  .reading-head{flex-direction:column}
  .reading-card h3{font-size:16px}
  .country-map-shell{grid-template-columns:1fr}
  .country-map-stage{height:360px}
  .country-map-list{max-height:none;grid-template-columns:repeat(2,minmax(0,1fr))}
  #detailModal{padding:10px}
  #detailPanel{max-height:100vh;width:100%;border:none}
  #detailHead{padding:18px 18px 14px}
  #detailHeadTitle{font-size:18px}
  #detailBody{padding:18px 18px 24px;font-size:13.5px}
  .detail-jump-card{padding:14px 15px}
}
@media(max-width:420px){
  .timeline{padding:0 8px 56px}
  .col-headers{grid-template-columns:1fr 32px 1fr;padding:18px 8px 6px}
  .event-row{grid-template-columns:minmax(0,1fr) 32px minmax(0,1fr)}
  .regional-inline-head{grid-template-columns:1fr 32px 1fr}
  .card-inner{padding:8px 8px 7px}.card-title{font-size:10px}.card-desc{font-size:9px}
  .act-btn{letter-spacing:.5px;padding:3px 6px}
  .era-content{padding:0 10px 12px}
  .country-map-list{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="ornament">Middle East Historical Atlas</div>
  <h1>中东历史线索</h1>
  <div class="gold-line"></div>
</header>

<!-- Mode Switcher -->
<div class="mode-bar" id="modeBar">
  <button class="mode-btn active" data-mode="regional">时间线</button>
  <button class="mode-btn" data-mode="country">国家支线</button>
  <button class="mode-btn" data-mode="conflict">冲突专题</button>
</div>

<!-- Country Sub-selector -->
<div class="sub-selector" id="countrySel"></div>

<!-- Conflict Sub-selector -->
<div class="sub-selector" id="conflictSel"></div>

<!-- Overview Card -->
<div class="overview-card" id="overviewCard">
  <h2 id="overviewTitle"></h2>
  <div class="overview-body" id="overviewBody"></div>
</div>

<div class="search-shell">
  <div class="search-panel">
    <div class="search-input-wrap">
      <label class="search-label" for="eventSearchInput">事件搜索</label>
      <input id="eventSearchInput" class="search-input" type="search" placeholder="搜事件、年份、国家、专题，比如 1967 / 伊朗 / 巴以 / 萨达姆" autocomplete="off">
    </div>
    <div class="search-hint">支持关键词直达，匹配标题、标签、年份、简介、国家名和专题名。</div>
    <div id="eventSearchResults" class="search-results" hidden></div>
  </div>
</div>

<!-- Era Filter -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-era="all">全部</button>
  <button class="filter-btn" data-era="ancient">古代文明</button>
  <button class="filter-btn" data-era="classical">古典时代</button>
  <button class="filter-btn" data-era="islamic">伊斯兰兴起</button>
  <button class="filter-btn" data-era="medieval">中世纪</button>
  <button class="filter-btn" data-era="ottoman">奥斯曼帝国</button>
  <button class="filter-btn" data-era="modern">近现代</button>
  <button class="filter-btn" data-era="contemporary">当代</button>
</div>

<div class="col-headers">
  <div class="col-label left"><span>🌙 中东</span><small>MIDDLE EAST</small></div>
  <div></div>
  <div class="col-label right"><span>🌍 世界</span><small>WORLD</small></div>
</div>
<div class="timeline" id="timeline"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot me"></div>中东事件</div>
  <div class="legend-item"><div class="legend-dot wo"></div>世界事件</div>
</div>

<!-- Map Modal -->
<div id="mapModal">
  <div id="mapPanel">
    <div id="mapHeader">
      <div><div id="mapTitle">HISTORICAL MAP</div><div id="mapSubtitle"></div></div>
      <button class="modal-close" onclick="closeMap()">✕ 关闭地图</button>
    </div>
    <div id="mapWrap"><div id="theMap"></div><div id="mapLegend"></div></div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" onclick="maybeCloseDetail(event)">
  <div id="detailPanel">
    <div id="detailHead">
      <div id="detailMeta">
        <div id="detailTag"></div>
        <div id="detailHeadTitle"></div>
        <div id="detailYear"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// Global declarations
const DETAILS = {};
const h3=(i,t)=>`<h3>${i} ${t}</h3>`;
const p=t=>`<p>${t}</p>`;
const ul=(...a)=>`<ul>${a.map(x=>`<li>${x}</li>`).join('')}</ul>`;
const li=(n,d)=>`<strong>${n}</strong>：${d}`;
const todoDetail=(title)=>h3('📝','TODO')+p(`待扩写：${title}。这里先保留事件骨架，后续再补地图、角色、族群、过渡与今日联系。`);
</script>

<script src="data/details-ottoman.js"></script>
<script src="data/details-modern.js"></script>
<script src="data/details-contemporary.js"></script>
<script src="data/maps.js"></script>
<script src="data/events.js"></script>
<script src="data/countries.js"></script>
