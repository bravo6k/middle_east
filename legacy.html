<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中东历史时间线 v3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@300;400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9932A;--gold-l:#E8B84B;--sand:#F2E4C4;--parchment:#F9F0DC;--ink:#1C1008;--wb:#1A3A5C;--wbl:#2E6A9E;--wa:#4FA3D1;--div:rgba(201,147,42,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--sand);font-family:'Noto Serif SC',serif;overflow-x:hidden}
header{position:relative;text-align:center;padding:60px 20px 44px;background:radial-gradient(ellipse at 50% 0%,#3a1a05 0%,var(--ink) 70%)}
.ornament{font-family:'Cinzel',serif;color:var(--gold);font-size:12px;letter-spacing:8px;text-transform:uppercase;opacity:.8;margin-bottom:12px}
header h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.8rem,5vw,3.6rem);color:var(--gold-l);text-shadow:0 2px 30px rgba(201,147,42,.4);letter-spacing:2px;line-height:1.15}
header p{font-family:'IM Fell English',serif;font-style:italic;color:rgba(242,228,196,.6);font-size:1.05rem;margin-top:12px}
.gold-line{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto}
.filter-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:18px 20px;background:rgba(28,16,8,.9);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.filter-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:6px 14px;border:1px solid var(--div);background:transparent;color:rgba(242,228,196,.55);cursor:pointer;transition:all .25s;text-transform:uppercase}
.filter-btn:hover,.filter-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.col-headers{display:grid;grid-template-columns:1fr 82px 1fr;max-width:1360px;margin:0 auto;padding:32px 24px 12px}
.col-label{text-align:center;padding:10px}.col-label.left{text-align:right;padding-right:28px}.col-label.right{text-align:left;padding-left:28px}
.col-label span{font-family:'Cinzel',serif;font-size:14px;letter-spacing:4px;text-transform:uppercase}
.col-label.left span{color:var(--gold)}.col-label.right span{color:var(--wa)}
.col-label small{display:block;font-size:10px;opacity:.45;letter-spacing:2px;margin-top:4px}
.timeline{max-width:1360px;margin:0 auto;padding:0 24px 96px;position:relative}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--gold) 0%,rgba(201,147,42,.25) 50%,var(--wbl) 100%);transform:translateX(-50%)}
.era-header{display:flex;justify-content:center;padding:42px 0 20px;position:relative;z-index:10}
.era-badge{font-family:'Cinzel',serif;font-weight:700;font-size:14px;letter-spacing:4px;text-transform:uppercase;padding:9px 28px;border:1px solid var(--gold);color:var(--gold);background:var(--ink)}
.era-badge::before,.era-badge::after{content:'◆';margin:0 8px;font-size:7px;opacity:.6}
.event-row{display:grid;grid-template-columns:1fr 82px 1fr;align-items:start;margin-bottom:14px;opacity:0;animation:fadeUp .5s ease forwards;animation-play-state:paused}
.event-row.vis{animation-play-state:running}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.event-node{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:18px;position:relative;z-index:5}
.node-year{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold-l);letter-spacing:.8px;text-align:center;line-height:1.1}
.node-dot{width:18px;height:18px;border-radius:50%;background:var(--ink);border:3px solid var(--gold);flex-shrink:0;transition:transform .2s}
.node-dot:hover{transform:scale(1.4)}.node-dot.wo{border-color:var(--wbl)}.node-dot.both{border-color:var(--gold-l);background:radial-gradient(circle,var(--wb) 50%,var(--ink) 50%)}
.event-card{margin:8px 8px;cursor:pointer;transition:transform .2s}.event-card:hover{transform:scale(1.015)}
.card-inner{padding:16px 20px 14px;transition:background .2s}
.event-card.me .card-inner{text-align:right;border-right:3px solid var(--gold);border-top:1px solid rgba(201,147,42,.15);border-bottom:1px solid rgba(201,147,42,.15);background:linear-gradient(to left,rgba(201,147,42,.07),transparent)}
.event-card.we .card-inner{border-left:3px solid var(--wbl);border-top:1px solid rgba(46,106,158,.15);border-bottom:1px solid rgba(46,106,158,.15);background:linear-gradient(to right,rgba(46,106,158,.09),transparent)}
.event-card:hover .card-inner{background:rgba(255,255,255,.07)!important}
.card-tag{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.55;margin-bottom:6px}
.me .card-tag{color:var(--gold-l)}.we .card-tag{color:var(--wa)}
.card-title{font-weight:600;font-size:17px;line-height:1.45;margin-bottom:8px;color:var(--parchment)}
.card-meta{font-size:11px;line-height:1.45;color:rgba(201,147,42,.78);margin:-2px 0 8px;letter-spacing:.2px}
.card-desc{font-size:14px;line-height:1.75;color:rgba(242,228,196,.68)}
.card-actions{display:flex;gap:8px;margin-top:12px}
.me .card-actions{justify-content:flex-end}.we .card-actions{justify-content:flex-start}
.act-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:6px 12px;border:1px solid;background:transparent;cursor:pointer;transition:all .2s;text-transform:uppercase}
.act-btn.map-btn{border-color:rgba(201,147,42,.4);color:rgba(201,147,42,.7)}
.act-btn.map-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.act-btn.dtl-btn{border-color:rgba(79,163,209,.35);color:rgba(79,163,209,.7)}
.act-btn.dtl-btn:hover{background:var(--wa);color:var(--ink)}
.we .act-btn.map-btn{border-color:rgba(79,163,209,.4);color:rgba(79,163,209,.7)}
.we .act-btn.map-btn:hover{background:var(--wa);color:var(--ink)}
.we .act-btn.dtl-btn{border-color:rgba(201,147,42,.35);color:rgba(201,147,42,.7)}
.we .act-btn.dtl-btn:hover{background:var(--gold);color:var(--ink)}
.event-card.empty{cursor:default;pointer-events:none}
#mapModal{position:fixed;inset:0;z-index:1000;display:none;align-items:stretch;justify-content:stretch;padding:16px;background:rgba(5,3,1,.72);backdrop-filter:blur(4px)}
#mapModal.open{display:flex}
#mapPanel{display:flex;flex-direction:column;flex:1;min-height:0;border:1px solid var(--div);background:rgba(10,5,2,.97)}
#mapHeader{padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--div);flex-shrink:0;background:rgba(10,5,2,.97)}
#mapTitle{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--gold-l)}
#mapSubtitle{font-size:11px;color:rgba(242,228,196,.45);margin-top:2px;font-style:italic}
.modal-close{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;padding:6px 16px;border:1px solid var(--div);background:transparent;color:var(--sand);cursor:pointer;transition:all .2s}
.modal-close:hover{background:#7A1F1F;border-color:#7A1F1F}
#mapWrap{flex:1;position:relative;min-height:0}
#theMap{width:100%;height:100%}
#mapLegend{position:absolute;bottom:20px;left:20px;background:rgba(10,5,2,.88);border:1px solid var(--div);padding:12px 16px;z-index:900;max-width:280px;pointer-events:none}
#mapLegend h4{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px;color:rgba(242,228,196,.8)}
.leg-swatch{width:16px;height:10px;border-radius:2px;flex-shrink:0}
#detailModal{position:fixed;inset:0;z-index:1001;display:none;align-items:flex-start;justify-content:flex-end;background:rgba(5,3,1,.65);backdrop-filter:blur(4px)}
#detailModal.open{display:flex}
#detailPanel{width:min(560px,100%);height:100%;background:linear-gradient(160deg,#1e0e05 0%,#120903 100%);border-left:1px solid var(--div);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
#detailHead{padding:20px 24px 16px;border-bottom:1px solid var(--div);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;background:rgba(201,147,42,.05)}
#detailMeta{flex:1}
#detailTag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
#detailHeadTitle{font-family:'Cinzel',serif;font-size:16px;color:var(--gold-l);line-height:1.3}
#detailYear{font-size:11px;color:rgba(242,228,196,.4);margin-top:5px;font-style:italic}
#detailBody{padding:22px 24px;flex:1;line-height:1.9;font-size:13.5px;color:rgba(242,228,196,.85)}
#detailBody h3{font-family:'Cinzel',serif;color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--div)}
#detailBody h3:first-child{margin-top:0}
#detailBody p{margin-bottom:13px}
#detailBody ul{margin:0 0 13px 18px}
#detailBody li{margin-bottom:7px}
#detailBody strong{color:var(--gold-l);font-weight:600}
.legend{display:flex;justify-content:center;gap:26px;padding:18px;border-top:1px solid var(--div);font-size:10px;color:rgba(242,228,196,.45);letter-spacing:1px}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-dot{width:9px;height:9px;border-radius:50%;border:2px solid}
.legend-dot.me{border-color:var(--gold)}.legend-dot.wo{border-color:var(--wa)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--ink)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.leaflet-tooltip{background:rgba(20,10,2,.92)!important;color:#E8B84B!important;border:1px solid rgba(201,147,42,.6)!important;font-size:12px!important;padding:5px 10px!important;border-radius:3px!important;box-shadow:0 2px 10px rgba(0,0,0,.7)!important}
.leaflet-tooltip::before{display:none!important}
.leaflet-container{background:#0a0a1a}
@media(max-width:600px){#mapModal{padding:8px}.col-headers{grid-template-columns:1fr 38px 1fr;padding:20px 12px 8px}.col-label{padding:8px 0}.col-label.left{padding-right:12px}.col-label.right{padding-left:12px}.col-label span{font-size:10px;letter-spacing:3px}.timeline{padding:0 12px 64px}.event-row{grid-template-columns:minmax(0,1fr) 38px minmax(0,1fr)}.event-node{padding-top:10px}.node-year{font-size:8px}.event-card{margin:4px 2px}.card-inner{padding:10px 10px 8px}.card-title{font-size:11px}.card-desc{font-size:10px;line-height:1.45}.card-actions{gap:4px;flex-wrap:wrap}.act-btn{font-size:8px;padding:4px 8px}}
@media(max-width:420px){.timeline{padding:0 8px 56px}.col-headers{grid-template-columns:1fr 32px 1fr;padding:18px 8px 6px}.event-row{grid-template-columns:minmax(0,1fr) 32px minmax(0,1fr)}.card-inner{padding:8px 8px 7px}.card-title{font-size:10px}.card-desc{font-size:9px}.act-btn{letter-spacing:.5px;padding:3px 6px}}
</style>
</head>
<body>
<header>
  <div class="ornament">◆ History of the Middle East ◆</div>
  <h1>中东文明史<br><span style="font-size:.52em;letter-spacing:6px;opacity:.72">与世界同行的时间长河</span></h1>
  <div class="gold-line"></div>
  <p>🗺 点击查看历史疆域（Google 底图显示当代国界与地名）&nbsp;·&nbsp; 📖 点击阅读深度解析（详情内容预载，无需后端 API；地图与字体仍需联网）</p>
</header>
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-era="all">全部</button>
  <button class="filter-btn" data-era="ancient">古代文明</button>
  <button class="filter-btn" data-era="classical">古典时代</button>
  <button class="filter-btn" data-era="islamic">伊斯兰兴起</button>
  <button class="filter-btn" data-era="medieval">中世纪</button>
  <button class="filter-btn" data-era="ottoman">奥斯曼帝国</button>
  <button class="filter-btn" data-era="modern">近现代</button>
  <button class="filter-btn" data-era="contemporary">当代</button>
</div>
<div class="col-headers">
  <div class="col-label left"><span>🌙 中东</span><small>MIDDLE EAST</small></div>
  <div></div>
  <div class="col-label right"><span>🌍 世界</span><small>WORLD</small></div>
</div>
<div class="timeline" id="timeline"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot me"></div>中东事件</div>
  <div class="legend-item"><div class="legend-dot wo"></div>世界事件</div>
</div>

<div id="mapModal">
  <div id="mapPanel">
    <div id="mapHeader">
      <div><div id="mapTitle">HISTORICAL MAP</div><div id="mapSubtitle"></div></div>
      <button class="modal-close" onclick="closeMap()">✕ 关闭地图</button>
    </div>
    <div id="mapWrap"><div id="theMap"></div><div id="mapLegend"></div></div>
  </div>
</div>

<div id="detailModal" onclick="maybeCloseDetail(event)">
  <div id="detailPanel">
    <div id="detailHead">
      <div id="detailMeta">
        <div id="detailTag"></div>
        <div id="detailHeadTitle"></div>
        <div id="detailYear"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══ PRE-GENERATED DETAILS (离线预载，无需API) ═══
const h3=(i,t)=>`<h3>${i} ${t}</h3>`;
const p=t=>`<p>${t}</p>`;
const ul=(...a)=>`<ul>${a.map(x=>`<li>${x}</li>`).join('')}</ul>`;
const li=(n,d)=>`<strong>${n}</strong>：${d}`;
const todoDetail=(title)=>h3('📝','TODO')+p(`待扩写：${title}。这里先保留事件骨架，后续再补地图、角色、族群、过渡与今日联系。`);


const DETAILS={
mesopotamia:h3('🎯','本章为什么重要')+p('如果把中东历史想成一部很长的连续剧，那么苏美尔这一章就是整部剧第一次真正搭起“城市、文字、行政、神权、族群互动”同台演出的舞台。它的重要性不只在于“最早”，而在于它把人类社会推进到一个此前没有稳定出现过的复杂层级。后面你看到的阿卡德、巴比伦、亚述、波斯，很多并不是平地起高楼，而是在这块地基上继续扩建。')+h3('📜','历史背景')+p('约公元前4000年至前3000年，底格里斯河与幼发拉底河下游冲积平原逐渐形成密集聚落。这里河道反复改道、洪水与盐碱化并存，逼迫居民发展灌溉、堤坝、渠道和谷仓管理。正是在这种必须集体协作的环境里，苏美尔南部城邦逐步成形，乌鲁克也因此常被视为世界上最早的大型城市之一。')+h3('🗺','地图上这些地方在讲什么')+p('这一部分地图不应只是一块抽象色块，它对应的是南美索不达米亚最早的城市网络。乌鲁克通常被视为城市化突破口；乌尔后来成为王朝中心与宗教重镇；埃利都在传统中被视为极古老的圣城；尼普尔是宗教权威极高的祭祀中心；拉格什体现了灌溉平原上多个强势城邦并立的现实；基什则位于更北侧，长期扮演连接南北两河世界的过渡枢纽。地图上额外点出的苏萨方向，则提醒你苏美尔并不是关起门来自己发明文明，它从一开始就和伊朗高原西缘、上两河通道、波斯湾贸易网络存在联系。')+h3('🌐','同期中东全景')+ul(li('埃及尼罗河谷','此时正处在前王朝整合阶段，已经出现更复杂的聚落与权力中心，但尚未形成后来那种高度统一的法老国家'),li('黎凡特走廊','存在聚落、贸易节点和神庙网络，是连接埃及、两河与安纳托利亚的重要陆桥，但城市国家的密度和行政复杂度通常仍不如南两河'),li('苏萨与胡齐斯坦平原','伊朗高原西缘并非空白，区域中心正在成长，后来会长期与两河世界发生竞争、贸易与文化交换'),li('上两河与安纳托利亚边缘','已经有人群定居、手工业和区域中心，只是政治整合度普遍低于南部灌溉城邦带'),li('阿拉伯半岛','并不是“野人荒地”，而是以分散部落、游牧线路、绿洲聚落和低密度交换网络为主，只是尚未出现像南两河那样高密度、可持续扩张的文书国家'))+h3('👥','主要族群与语言')+p('这一时期南部的主导人群通常被称为苏美尔人，他们使用苏美尔语。与此同时，北部与边缘地带也逐渐出现讲闪米特语的人群，后来的阿卡德力量正是从这种长期并存中成长出来。换句话说，两河文明从一开始就不是单一民族神话，而是多族群、多城邦、长期互动甚至竞争的复杂格局。')+h3('🏛','国家形成度与权力结构')+p('苏美尔并非一开始就是统一帝国，而更像由彼此竞争的城邦组成的“城市国家网络”。每座城市往往围绕大神庙、仓储系统和运河网络组织生产，祭司、书记员、工匠、农民与统治者共同构成早期国家机器。为了记录粮食、牲畜、劳役与税赋，泥板记号逐渐演化为楔形文字，这不是单纯的文化奇迹，更是行政管理压力逼出来的技术发明。也正因为如此，这一章里的“国家”更准确地说是神庙国家、城邦国家或早期行政共同体，而不是后世那种边界清晰的统一帝国。')+h3('🔄','和更早阶段相比，变了什么')+p('在更早的新石器与铜石并用时代，中东当然已经有农业、村落、手工业与宗教中心，但社会组织仍以地方性聚落为主。到了苏美尔阶段，真正发生质变的是：人口开始更高密度集中，水利工程要求长期协作，粮仓和神庙需要精细管理，陌生人之间的分工越来越制度化。人类不再只是“住在村庄里”，而是开始“被组织在一个会记账、会调配、会征用劳役的系统里”。')+h3('🌍','深远影响')+p('苏美尔城邦为后世留下了太多底层模板：城市国家、书记员制度、神庙经济、法律文本、王权神授叙事、六十进制、早期天文历法、轮车与风帆的广泛应用。后来的阿卡德、巴比伦、亚述乃至更晚的帝国，很多都不是凭空诞生，而是在苏美尔打下的制度地基上继续扩建。')+h3('👤','关键人物')+ul(li('恩-美尔卡尔','乌鲁克传说中的早期统治者，常与城市扩张和文字起源的叙事联系在一起'),li('吉尔伽美什','约前3千纪早期与乌鲁克相关的历史性人物，其形象后来被神话化为《吉尔伽美什史诗》的英雄'),li('祭司与书记员阶层','虽然并非单一“名人”，却是真正维持早期城邦运转的制度核心'))+h3('💡','这章真正留下了什么')+p('苏美尔的真正突破，不只是“很早”，而是它把人类社会推进到一个新层级：人口高度集中、陌生人大规模协作、资源再分配、文字记账、法权雏形、宗教与政治制度化。很多现代人一提中东就先想到帝国、宗教与战争，但在更深的底层，中东首先是一片很早就学会如何把城市、粮食、河流和权力绑在一起的土地。')+h3('🧬','后世族群与冲突的远因')+p('今天中东很多矛盾当然不能简单追溯到苏美尔时代，但“多族群共处于同一交通走廊、依赖同一水系、围绕城市与神圣中心争夺资源”这一结构，在两河地区几乎从未真正消失。后来的阿卡德人、亚述人、阿拉伯人、波斯人、库尔德人、土库曼人与现代民族国家，都是在这片古老走廊上继续叠加。理解最早的城市网络，有助于理解为什么伊拉克从来不只是一个现代国名，而是一块被反复争夺、反复重写的文明核心地带。')+h3('🗺','这张图怎么读')+ul(li('深色轮廓','表示苏美尔城邦最密集、最核心的活动区'),li('浅色轮廓','表示主要灌溉城市带，也就是文明真正持续膨胀的农业腹地'),li('蓝色虚线区','表示与伊朗高原西缘的接触带，提醒你苏美尔并不是孤立存在'),li('金色点','核心城邦或宗教中心'),li('橙色点','南北过渡枢纽'),li('蓝色点','周边互动中心。整张图展示的是“势力空间”和“互动带”，不是现代国家边界'))+h3('➡️','为什么会走到下一章')+p('苏美尔并没有被某一个永恒王朝固定下来。城邦之间长期竞争、联盟、内战与对灌溉网络的争夺，反而不断训练出更大的军事与行政整合能力。随着讲闪米特语的阿卡德力量在北部和中部两河上升，城邦世界最终被一个跨城邦的征服帝国第一次真正统一，这就是下一章阿卡德帝国登场的原因。')+h3('🔗','与今日的联系')+p('现代伊拉克南部的乌尔、乌鲁克与埃利都遗址已被纳入联合国教科文组织“伊拉克南部沼泽与美索不达米亚古城遗存”体系。它们今天既是世界文明源头的证据，也是战争、盗掘、环境退化与水资源变化共同施压下的脆弱遗产。对现代中东来说，苏美尔最重要的遗产不是某一座孤零零的古城，而是“这片河谷自古就是人口、资源、宗教与权力高度重叠的核心地带”这一事实。'),

akkad:h3('🎯','本章为什么重要')+p('如果说苏美尔让城市自己长出了国家雏形，那么阿卡德这一章的重要性在于，它第一次把许多原本彼此竞争的城邦压进了同一座帝国框架。这里出现的不是单座城市更强，而是“跨城市征服、驻军、总督和统一王权”开始稳定成形。后面巴比伦、亚述、波斯会反复放大的，正是这套第一次被阿卡德人做出来的帝国逻辑。')+h3('📜','历史背景')+p('约公元前24世纪，苏美尔城邦虽然富庶，却也长期陷于彼此竞争。北部和中部两河地区讲闪米特语的人群与南方苏美尔城邦长期共处、贸易、雇佣与冲突。萨尔贡在这样的环境中崛起，他没有满足于控制一座城市，而是把城邦之间原本分散的战争，推进成跨区域征服与整合，阿卡德帝国因此被很多人视为世界上最早的真正帝国之一。')+h3('🗺','地图上这些地方在讲什么')+p('阿卡德的地图重点不是边界有多精确，而是看它如何把南北两河连成一个政治走廊。阿卡德本都的位置今天仍有争议，所以图上用的是“阿卡德方向”而不是绝对钉死某一点；基什和尼普尔代表旧城邦核心区；乌鲁克与乌尔提醒你苏美尔传统并没有消失，而是被新征服者收编；马里则意味着幼发拉底上游和叙利亚通道第一次被更明确地拉进帝国视野。')+h3('🌐','同期中东全景')+ul(li('埃及','此时正逐渐走向古王国的集中化王权，和两河一样，也在探索如何把河谷资源压进更大国家结构'),li('叙利亚与上幼发拉底','不是空白地带，而是通往木材、金属和更西方交换网络的关键走廊'),li('伊朗高原西缘','持续与两河发生贸易和冲突，说明帝国从一开始就不是单纯的河谷内部故事'),li('阿拉伯边缘与沙漠通道','仍以低密度部族、商旅与边缘聚落为主，但已经和两河交换体系发生联系'))+h3('👥','主要族群与语言')+p('阿卡德帝国的统治核心与阿卡德语关系更紧密，但它并没有把苏美尔语世界抹掉。相反，苏美尔传统、神庙权威、地方精英和阿卡德语王权一起构成了这套混合秩序。中东历史里最典型的一件事，在这里已经看得很清楚：新王朝常常不是消灭旧文明，而是站到旧文明肩膀上。')+h3('🏛','国家形成度与权力结构')+p('阿卡德比苏美尔城邦更进一步的地方，是把战争、驻军、官员任命、贡赋和王权宣传明显推向了更高层级。城市仍然重要，但它们不再只是各管各的城邦，而开始被纳入帝国主从关系。你可以把这一章看成中东历史第一次真正试出“帝国国家”这台机器大概应该怎么运转。')+h3('🔄','和上一章相比，变了什么')+p('苏美尔是多座城市一起点灯，阿卡德则像有人第一次把这些灯接到同一条总线上。政治尺度变大了，王权开始凌驾于多个城邦之上；文化上，苏美尔并没有被切断，而是被帝国继续利用。')+h3('➡️','为什么会走到下一章')+p('阿卡德虽然开创了帝国范式，但也暴露了帝国的老问题：距离太远、地方太多、气候与粮食压力、继承与叛乱都可能把它撕开。帝国崩解后，两河世界并没有回到原点，而是在乌尔第三王朝、阿摩利人势力和一系列新王国竞争中重新洗牌。经过几百年反复整合，汉谟拉比时代的古巴比伦王国才会再次把两河收束起来。')+h3('👤','关键人物')+ul(li('萨尔贡','阿卡德帝国缔造者，把跨城邦征服推进成帝国统一'),li('纳拉姆辛','帝国高峰统治者之一，强化王权神圣性'),li('恩赫杜安娜','王族女性与重要祭司，常被视为世界上最早留下姓名的作者之一'))+h3('🧬','后世影响')+p('阿卡德最大的遗产，是让中东从“城邦时代”走进了“帝国可以被想象、也可以被重建”的时代。后面的巴比伦、亚述、波斯并不是突然发明帝国，而是在阿卡德先开出的道路上不断翻修。'),

babylon:h3('🎯','本章为什么重要')+p('如果说苏美尔让中东第一次学会了城市运转，那么巴比伦这一章真正重要的地方，在于它把分裂的城市世界进一步拧成了更稳定的王国机器。汉谟拉比的名气当然来自法典，但更深的意义在于：他把征服、行政、审判、神授正义和王权宣传捆成了同一套叙事，后面很多中东帝国都在沿着这条路继续往前走。')+h3('📜','历史背景')+p('公元前第二千纪前半叶，两河流域并不是一张平静的大地图，而是一锅持续翻滚的政治浓汤。阿卡德和乌尔第三王朝的旧秩序瓦解后，伊辛、拉尔萨、埃什努那、马里、阿淑尔等政权彼此竞争，来自西方的阿摩利人王朝逐渐在多座城市掌权。巴比伦原本只是幼发拉底河中游一座并不起眼的城市，但到汉谟拉比即位时，它已经积累出足够的财政、灌溉和战略位置优势，最终从诸强混战中突围。')+h3('🗺','地图上这些地方在讲什么')+p('这张地图要传达的不是一块静止疆域，而是汉谟拉比如何把河流、城市和通道一段段接到自己手里。巴比伦是王权与法典叙事中心；西帕尔和博尔西帕是王国北缘与宗教行政节点；尼普尔虽然不一定永远属于最强政治中心，却一直拥有很高的宗教合法性；拉尔萨代表南方旧强权被吸收的过程；马里象征幼发拉底上游外交与贸易世界；阿淑尔提醒你北方并不是空白，而是另一种正在成长的国家力量；苏萨则把目光引向埃兰和伊朗高原西缘，说明巴比伦从来不是关起门来独自称王。')+h3('🌐','同期中东全景')+ul(li('埃及','此时大致处在中王国末段到第二中间期前夜，尼罗河国家仍具统一传统，但和两河相比，它的政治重心更集中在河谷王朝本身'),li('上两河与叙利亚东部','马里仍是重量级角色，幼发拉底走廊把两河、叙利亚和更西边的城市网络连成一片'),li('阿淑尔与北美索不达米亚','北方不是配角背景板，而是由沙姆希阿达德等强人尝试整合的竞争空间，后来亚述帝国正是从这里长出来'),li('苏萨与埃兰','在两河东侧，埃兰长期和美索不达米亚纠缠，既交换文化，也进行战争与掠夺'),li('安纳托利亚','中铜器时代的城市和贸易站相当活跃，亚述商人网络把金属、纺织品与书写制度一路送进小亚细亚'),li('黎凡特与南方沙漠边缘','这里不是无人区，而是由城镇、商路、牧人与边缘部族拼成的走廊，只是尚未形成像两河与埃及那样密度极高的文书国家'))+h3('👥','主要族群与语言')+p('这一时期的统治精英常带有阿摩利人背景，但真正支撑国家运作的行政语言主要仍是阿卡德语，苏美尔语则继续作为宗教、学术和王权文化记忆的重要资源保留下来。换句话说，古巴比伦并不是一个单一民族国家，而更像多层人群叠在一起的政治机器：阿摩利王朝、阿卡德语书记体系、苏美尔传统权威、北方和西方的闪米特语人群，以及东边埃兰世界的持续存在。')+h3('🏛','国家形成度与权力结构')+p('和苏美尔那种多个城邦长期并立相比，汉谟拉比时代更接近真正的领土王国。它仍依赖城市、神庙和灌溉网络，但王权已经能更稳定地把法令、税赋、军事动员和司法裁决从首都往外推送。你可以把它理解成从城市网络迈向王国国家的关键一跳：地方依旧重要，可中央已经开始更系统地收编地方。')+h3('📋','汉谟拉比法典到底意味着什么')+p('所谓汉谟拉比法典，并不是现代意义上人人平等的宪法，也不只是一个网红版的“以眼还眼”。它现存282条判例式法律，涵盖贸易、婚姻、财产、继承、工资、债务、奴隶、伤害赔偿等，很多条文采用“如果……那么……”的条件句结构。更关键的是，处罚往往会因当事人的社会身份不同而不同，所以它反映的不是现代平等观，而是古代王权试图把复杂社会装进一套可宣示、可裁判、可被神圣化的秩序框架。')+h3('⚖️','法典和地图为什么要放在一起看')+p('因为巴比伦的法律从来不是悬浮在空中的抽象理念，它和王国控制哪些城市、哪些运河、哪些贸易节点直接相关。能写法，前提是你有能力征税、征粮、征人、派法官、派总督、处理地方纠纷。法典石碑既是法律文本，也是政治广告牌，告诉所有人：王不只是会打仗，他还能定义什么叫秩序。')+h3('🔄','和上一章相比，变了什么')+p('苏美尔那一章更像多座城市同时点灯，而到了巴比伦，灯还在，但总闸开始被某个王朝握在手里。政治结构从长期分裂的城邦竞争，更明显地转向以首都为中心的整合王国；文化上，苏美尔传统并没有消失，而是被新王朝吸收到更大框架里。中东历史里那种“新征服者继承旧文明语言和制度”的经典模式，在这里已经非常清楚。')+h3('🌍','深远影响')+p('巴比伦留下的最大遗产，不只是那根著名石碑，而是一种可以反复复制的统治模板：首都作为秩序中心，王权通过法律、神意、城市建设和文书体系证明自身正当性。后来无论是亚述、波斯，还是更晚的伊斯兰帝国，其实都还在某种程度上重复这种逻辑。')+h3('👤','关键人物')+ul(li('汉谟拉比','古巴比伦第六王，把原本并不算头号强权的巴比伦推成两河政治中心'),li('沙马什','太阳与正义之神，法典图像中常作为授法神出现，帮助王权把司法包装成神意延伸'),li('辛穆巴利特','汉谟拉比之父，为巴比伦积累王位与地盘的前一代统治者'),li('齐姆里利姆','马里的重要统治者，既是盟友也是被巴比伦吞并的对象'))+h3('💡','这章真正留下了什么')+p('这章最重要的，不是让后人记住几条残酷刑罚，而是让人看清一个更成熟的国家如何出现：它会说自己代表正义，会把审判写下来，会把旧文化收编进新王朝，会让首都成为秩序象征。今天很多人想到中东时先想到帝国和宗教，而巴比伦告诉你，这一切之前还有一个同样关键的底层问题：谁有资格定义规则。')+h3('🧬','后世族群与历史遗留')+p('古巴比伦当然不能直接解释今天的民族政治，但它已经把中东一些深层结构显出来了：多族群共享同一河谷和商路，旧城旧神不会因为新王朝出现就消失，合法性既来自武力也来自文化继承。后来的亚述、波斯、阿拉伯、土耳其、伊朗等更晚的政治共同体，几乎都要面对同一个问题：如何统治一片语言、信仰、地方传统都很多的核心地带。')+h3('🗺','这张图怎么读')+ul(li('深色轮廓','表示巴比伦王国财政和行政控制最稳定的核心带'),li('浅色轮廓','表示汉谟拉比扩张后影响力显著增强的整合区与征服走廊'),li('蓝色虚线区','表示与苏萨和埃兰世界接触、竞争的东侧边缘'),li('金色点','首都、核心城市或宗教中心'),li('橙色点','枢纽城市、旧强权中心或向外扩张的重要通道'),li('蓝色点','周边强权或重要互动中心。整张图展示的是政治整合空间，不是现代国界'))+h3('➡️','为什么会走到下一章')+p('古巴比伦并不是一条会永远直线延续的王朝。汉谟拉比去世后，中央权力逐渐回落，地方势力重新抬头，外来打击与内部继承问题叠加，让两河再次进入长期重组。之后几百年里，先后轮到喀西特、亚述和新巴比伦等力量改写格局，所以从巴比伦直接跳到波斯会显得像瞬间换片场。真正的历史更像一连串接力赛，而不是一次断崖式切换。')+h3('🔗','与今日的联系')+p('巴比伦遗址位于今伊拉克巴比伦省，距巴格达约85公里。它在2019年被列入联合国教科文组织世界遗产名录，说明巴比伦并不是只活在宗教故事和流行文化里，而是真正可触摸的古代城市遗存。与此同时，这座遗址也提醒人们：古代文明核心地带在现代战争、建设和旅游开发面前同样脆弱。'),

neo_assyria:h3('🎯','本章为什么重要')+p('如果说阿卡德第一次做出了帝国雏形，那么新亚述这一章的重要性，在于它把帝国推进成一台高压、军事化、官僚化的巨型机器。它不只是征服别人，而是把行省、道路、情报、强制迁徙和恐怖威慑一起用到了极致。很多后来中东人对“帝国到底意味着什么”的直觉，其实很大一部分来自亚述。')+h3('📜','历史背景')+p('公元前1千纪前半叶，亚述从北美索不达米亚重新崛起。随着提格拉特帕拉沙三世、萨尔贡二世、辛那赫里布、埃萨尔哈东和亚述巴尼拔等君王相继扩张，亚述不再满足于做区域强国，而是一路把版图推到黎凡特、埃及和伊朗边缘。它继承了更早帝国的行政经验，却把战争组织和帝国暴力提升到了新的强度。')+h3('🗺','地图上这些地方在讲什么')+p('阿淑尔、尼姆鲁德和尼尼微代表帝国核心；巴比伦提醒你亚述并不是在真空中统治，而是必须不断处理两河南部这块文明腹地；大马士革和耶路撒冷象征黎凡特走廊被纳入帝国体系；孟菲斯说明帝国权力一度压到埃及；苏萨方向则提醒东侧也始终存在别的强权。')+h3('👥','主要族群与语言')+p('亚述的核心来自北两河的亚述人，但帝国内部远不止一种身份。阿拉米语在广阔帝国内越来越重要，阿卡德语继续保留高行政和书写传统，巴比伦人、腓尼基人、犹太人、埃及人以及许多地方社群都被卷入同一帝国框架。亚述的典型做法不是让所有人都变成同一种人，而是把不同人群打散、迁徙、重新安置。')+h3('🏛','国家形成度与权力结构')+p('新亚述已经是非常成熟的军政帝国。它的军队常备化程度更高，行省治理更深入，地方国王和总督被更严密地嵌入帝国机器。你可以把它看成古代帝国国家的高压版本：高效率，也高代价。')+h3('🔄','和上一章相比，变了什么')+p('巴比伦更像把河谷重新整合成王国，而亚述则把帝国的尺度、军队动员和强制治理都推得更远。中东历史在这里开始明显展现一种模式：中心不只是征服边缘，而是要持续改造边缘。')+h3('➡️','为什么会走到下一章')+p('正因为亚述太大、太硬、太依赖持续战争，它一旦出现继承危机和地方反叛，就会迅速失衡。公元前7世纪末，米底人与巴比伦人结盟，尼尼微在公元前612年陷落。亚述没有把帝国时代结束掉，反而把舞台交给了下一棒的新巴比伦王国。')+h3('👤','关键人物')+ul(li('提格拉特帕拉沙三世','把亚述重新推上帝国扩张轨道'),li('辛那赫里布','大规模重建尼尼微，也因对巴比伦和黎凡特的战争闻名'),li('亚述巴尼拔','帝国后期强君，留下著名的尼尼微图书馆'))+h3('🧬','后世影响')+p('新亚述留下的不只是“残暴”名声，而是一整套帝国技术：更深的行省制、系统性强制迁徙、道路与情报网络、以恐惧塑造秩序。它也让后来的新巴比伦和波斯学会了一个教训：帝国必须够强，但不能强到只剩下恐惧。'),

neo_babylon:h3('🎯','本章为什么重要')+p('新巴比伦这一章的意义，在于它是两河本地王朝在波斯到来之前最后一次重新站到中东舞台中央。它既继承了亚述倒下后的权力真空，也把巴比伦这座古老城市重新塑造成帝国核心。很多人对巴比伦的想象，其实更多来自这一时期，而不是汉谟拉比时代。')+h3('📜','历史背景')+p('亚述帝国崩溃后，纳波帕拉萨尔建立新巴比伦王国，尼布甲尼撒二世又把它推向高峰。公元前586年耶路撒冷陷落和巴比伦之囚，让这一章不仅是中东政治史，也是犹太历史与后世宗教记忆的重要节点。与此同时，巴比伦城市本身也通过城墙、神庙和纪念性建筑再次成为帝国象征。')+h3('🗺','地图上这些地方在讲什么')+p('巴比伦依旧是心脏；博尔西帕、西帕尔和尼普尔连接宗教与行政传统；哈兰和幼发拉底西线说明新巴比伦并不只守着两河南部；耶路撒冷与推罗代表它在黎凡特的控制和冲突；苏萨方向则提示一个新的、更危险的东方对手正在崛起。')+h3('👥','主要族群与语言')+p('新巴比伦延续阿卡德语书写传统，也继续站在苏美尔文化记忆之上。它统治的对象则包括两河南部居民、黎凡特诸城、被迁徙人群和各类地方精英。换句话说，它仍然是一块多语言、多社群的帝国空间，只是这次帝国中心重新回到了巴比伦。')+h3('🏛','国家形成度与权力结构')+p('这一时期的国家更接近“继承亚述框架、换上巴比伦核心”的区域帝国。它没有波斯后来那种横跨超级大陆的规模，却已经足够把两河、黎凡特和部分阿拉伯边缘一并纳入王朝权力之下。')+h3('🔄','和上一章相比，变了什么')+p('从亚述到新巴比伦，不是帝国结束，而是帝国主色调改变。亚述更像军政高压机器；新巴比伦则把古老巴比伦的文化合法性、宗教中心地位和城市象征重新推到前台。')+h3('➡️','为什么会走到下一章')+p('新巴比伦虽然重新发光，但它面前站着的是一个更大尺度的挑战者。伊朗高原上的波斯先整合米底，再吞并吕底亚，最后把目光投向巴比伦。公元前539年，居鲁士进入巴比伦，新的多民族帝国时代由此开启。')+h3('👤','关键人物')+ul(li('纳波帕拉萨尔','新巴比伦王国开创者'),li('尼布甲尼撒二世','最著名的统治者，推动巴比伦城市与帝国威望达到高峰'),li('拿波尼度','王朝末期统治者，其统治争议为波斯进入创造了条件'))+h3('🧬','后世影响')+p('新巴比伦把两河文明最后一次以本地帝国姿态推向高潮，也通过耶路撒冷陷落与流亡记忆深刻塑造了后来的犹太教、基督教和伊斯兰传统。它像一座高高燃起的晚灯，照亮了波斯登场前的最后一段古老河谷王朝时代。'),

persia:h3('🎯','本章为什么重要')+p('如果说巴比伦让两河世界更像一个能被王权拧紧的国家，那么波斯这一章真正重要的地方，在于它第一次把“如何统治许多民族、许多语言、许多旧王国”这件事，推到了帝国级别。阿契美尼德波斯并不是简单把地盘做大，而是把道路、行省、税赋、王权宣传和地方自治组合成一套可复制的多民族帝国治理模板。后来无论亚历山大、罗马、萨珊，还是更晚的哈里发国与奥斯曼，都在某种意义上继续回答它先提出的问题。')+h3('📜','历史背景')+p('公元前6世纪，中东并不是一块等待统一的空白拼图，而是由米底、新巴比伦、吕底亚、埃及和许多地方精英共同组成的强权马赛克。居鲁士二世先在伊朗西南部崛起，随后击败米底、吞并吕底亚，并在公元前539年进入巴比伦，阿契美尼德波斯帝国由此登上历史主舞台。对中东来说，这不是又一个单纯征服者的故事，而是一次权力重心从两河和单一王国逻辑，转向横跨高原、河谷、海岸与商道的帝国逻辑。')+h3('🗺','地图上这些地方在讲什么')+p('这张地图不该被理解成一块抽象的巨大紫色面，而应被看成几个层次叠在一起。波斯本土核心区位于法尔斯和伊朗高原西南缘，帕萨尔加德和后来的波斯波利斯象征王朝自我认同；苏萨和埃克巴坦那是帝国运转的重要政治中心；巴比伦是收编古老文明合法性的关键节点；萨第斯连接安纳托利亚和皇家大道西端；孟菲斯提醒你尼罗河谷也被纳入帝国结构；而爱琴海东缘与小亚细亚西岸，则是波斯与希腊世界长期碰撞的前线。')+h3('🌐','同期中东全景')+ul(li('新巴比伦余波','两河并没有因为被征服就失去重量，巴比伦仍是帝国最重要的城市之一，旧文明中心被新帝国继续利用'),li('埃及','埃及拥有极强的国家传统和宗教文化，即使被纳入波斯帝国，也始终不是“普通行省”，而是一块需要反复管理的高价值地区'),li('安纳托利亚与爱琴海东岸','这里汇集希腊城邦、吕底亚遗产和波斯行省，是帝国与海洋世界接触最剧烈的边缘地带'),li('黎凡特与耶路撒冷','这一带是帝国连接埃及与两河的走廊，也和犹太社群、神庙重建和后来的一神教记忆紧密相关'),li('中亚与更东方','帝国东缘延伸到中亚与印度河流域，说明波斯的视野从一开始就不是“近东小圈子”，而是欧亚交通网中的大国布局'))+h3('👥','主要族群、语言与宗教')+p('阿契美尼德波斯不是现代意义上的“单一民族国家”。王朝核心来自古波斯人，近亲力量包括米底人；帝国内部还包含巴比伦人、埃及人、腓尼基人、吕底亚人、犹太人、希腊人以及伊朗高原和中亚诸多族群。行政实践中会用到古波斯语、埃兰语、巴比伦语和阿拉米语等多种语言。宗教层面，王权与伊朗传统中的阿胡拉·马兹达崇拜关系密切，但帝国治理本身通常表现出相当强的地方容纳能力。')+h3('🏛','国家形成度与权力结构')+p('和巴比伦那种以河谷和首都为中心的领土王国相比，波斯已经是成熟得多的多地区帝国。它的关键不只是兵多地广，而是把不同时区、不同税制、不同传统的地区，纳入行省总督、皇家道路、驿站通信、贡赋体系和王权宣示共同支撑的架构之中。你可以把它理解成从“强王国”迈向“真正帝国国家”的关键跃迁：地方精英继续存在，但他们必须被放进更高一层的帝国秩序里。')+h3('📜','居鲁士圆柱到底意味着什么')+p('居鲁士进入巴比伦后留下的圆柱铭文，非常重要，但最好不要把它直接说成现代意义上的“第一份人权宣言”。它更接近一篇典型的古代王权公告：新君主指责前朝失德，宣称自己得到神明支持，恢复秩序、修复神庙、安置被迁徙的人群，并向地方精英保证新的统治是正当且有利的。它确实体现出一种相对务实、包容地方传统的帝国风格，但它的语境首先是古代统治合法性，而不是现代普世权利。')+h3('🛣','为什么这章要特别看道路与首都')+p('因为波斯的厉害，不只在于能打下城市，而在于能把远方城市持续连在一起。皇家大道、驿站系统、多处王都与行省治理，让帝国不再只是征服名单，而更像一台能跨区域运转的机器。帝国之所以能维持，不是因为每一块地方都被抹平成一样，而是因为中心学会了怎样让差异在帝国框架内继续存在。')+h3('🔄','和上一章相比，变了什么')+p('巴比伦代表的是一座首都如何收束一片河谷和周边走廊，而到了波斯，政治尺度突然被拉大。权力不再只围绕两河灌溉腹地展开，而是覆盖伊朗高原、安纳托利亚、黎凡特、埃及乃至更东方地带。文化上，波斯也不是把旧文明砸碎重来，而是把巴比伦、埃及、吕底亚等旧中心收编进更大的帝国结构里。中东历史里“新帝国继承旧文明”的逻辑，在这里进入成熟阶段。')+h3('🌍','深远影响')+p('波斯帝国留下的最深遗产，是多民族帝国治理的范式。后来的大帝国都要面对同一个问题：面对语言、宗教、习俗和地方精英都不一样的广阔疆域，如何既让他们留在原地，又让他们服从中心。行省、驿道、王权合法性、多首都安排和对地方传统的有限容纳，都是它留给后世的重要模板。')+h3('👤','关键人物')+ul(li('居鲁士大帝','帝国缔造者，把波斯从伊朗西南部势力推成横跨近东的大帝国'),li('冈比西斯二世','居鲁士之子，将帝国推进到埃及'),li('大流士一世','制度化帝国机器的人，整顿行省、税制、道路与王权表达'),li('薛西斯一世','延续帝国规模并与希腊世界发生更正面冲撞的统治者'))+h3('💡','这章真正留下了什么')+p('这章真正留下的，不只是“波斯很大”，而是一个关键的历史事实：中东从此不再只属于若干河谷国家和城市王朝，它开始习惯被一种跨地域、跨语言、跨宗教的帝国视角来组织。很多后来的政治想象，包括“核心区 + 行省 + 道路 + 地方自治 + 皇权合法性”的组合，都能在波斯这里找到成熟雏形。')+h3('🧬','后世族群与历史遗留')+p('波斯当然不能直接解释今天伊朗、伊拉克、土耳其、叙利亚或以色列巴勒斯坦的全部问题，但它早早就把一些长期结构定型了：高原与河谷要一起治理，帝国核心与边缘要长期协商，旧文明中心不会因为新王朝出现就失去分量，宗教与地方身份可以被收编，却不会完全消失。后来伊朗世界、阿拉伯世界、土耳其世界以及黎凡特的复杂认同，很多都还生活在这种“多中心帝国遗产”之中。')+h3('🗺','这张图怎么读')+ul(li('深紫色轮廓','表示波斯王朝的伊朗本土核心区与王朝自我认同中心'),li('浅紫色大轮廓','表示阿契美尼德帝国整合后的主要统治空间'),li('蓝色虚线区','表示爱琴海东缘和小亚细亚西岸这类长期冲突、接触最强的前线地带'),li('金色点','王朝核心都城或重要王权中心'),li('橙色点','帝国道路、行省治理或区域整合的关键枢纽'),li('蓝色点','边缘前线或重要被纳入的旧文明中心。整张图展示的是帝国治理空间，不是精确现代国界'))+h3('➡️','为什么下一章会转到希腊世界')+p('居鲁士攻克巴比伦讲的是帝国如何建立，下一章如果还继续讲同一个帝国，就必须把视角从“帝国成形”转到“帝国西线碰撞”。因为当波斯把小亚细亚和爱琴海东岸纳入版图后，它面对的就不再只是中东旧王国，而是希腊城邦世界。也正是在这条西部前线上，中东历史第一次被明显拉进古典地中海的大舞台。')+h3('🔗','与今日的联系')+p('今天伊朗社会对阿契美尼德时代仍有很强记忆，波斯波利斯和居鲁士相关遗址也是现代伊朗民族历史想象的重要组成部分。与此同时，波斯帝国的地理框架也提醒人们：今天看似分属不同国家的伊朗高原、伊拉克、黎凡特、安纳托利亚与埃及，在古代很长时间里其实都曾被放进同一套政治想象和交通网络之中。'),

persia_wars:h3('🎯','为什么要把这章单独拆出来')+p('这不是一个新的帝国，却是一个新的历史舞台。居鲁士攻克巴比伦讲的是波斯如何成为中东帝国，而波斯战争讲的是同一个帝国如何把触角伸到爱琴海，并因此与希腊城邦发生正面碰撞。它之所以值得单独成章，是因为这里的主线已经不再只是“谁统治两河”，而是“中东帝国如何进入古典地中海世界”。')+h3('📜','历史背景')+p('在居鲁士和其继承者扩张之后，小亚细亚西岸的希腊城邦被纳入波斯体系。公元前499年的爱奥尼亚起义让波斯意识到西部边缘并不稳定，大流士于是决定向更远的希腊本土施压。公元前490年的马拉松战役因此不是孤零零的一场战斗，而是帝国西线管理、海上边缘控制和地中海政治碰撞的缩影。')+h3('🗺','地图上这些地方在讲什么')+p('苏萨仍然代表帝国决策中心；萨第斯是小亚细亚西部行省枢纽；米利都提醒你爱奥尼亚希腊城邦是导火索之一；赫勒斯滂海峡说明欧亚连接并不是抽象概念，而是真正的军政走廊；马拉松与雅典方向则标出帝国势力真正碰到希腊本土的前线。')+h3('🌐','这一章的中东与地中海全景')+ul(li('中东内部','波斯帝国依然强大，巴比伦、埃及、黎凡特和伊朗高原仍在同一帝国架构之下'),li('小亚细亚西岸','希腊城邦在波斯统治与本地自治之间持续拉扯'),li('爱琴海','海权、岛屿、海峡和补给路线开始比纯陆地征服更重要'),li('希腊本土','并不是统一国家，而是许多彼此竞争的城邦，但面对波斯威胁时会阶段性联合'))+h3('👥','主要族群与语言')+p('这一章的特别之处就在于，波斯帝国内部的多族群现实，第一次和希腊世界的城邦身份发生剧烈碰撞。帝国这边依旧是古波斯人、米底人、巴比伦人、腓尼基人、埃及人、吕底亚人与许多地方力量共同运作；而在前线，希腊语世界的地方自治传统则构成另一种政治逻辑。')+h3('🏛','国家形成度与权力结构')+p('这里对比最鲜明的，不是文明高低，而是政治形式不同。波斯是大帝国，擅长跨区域调兵和行省治理；希腊是城邦体系，灵活、碎片化，但在局部动员和海上战争中也很强。正因为双方不是一个类型的政治体，所以冲突才格外有历史戏剧性。')+h3('🔄','和上一章相比，变了什么')+p('上一章的焦点是波斯如何吞并巴比伦、继承近东旧王国；这一章的焦点则转到帝国边缘。也就是说，主角还是波斯，但镜头从帝国成立，切到了帝国西部前线。你可以把它看成同一帝国的第二幕，而不是前一章的简单重复。')+h3('➡️','为什么会走到下一章')+p('波斯战争并没有立刻让帝国崩塌，但它让希腊世界和波斯帝国彼此把对方牢牢记住。一个多世纪后，亚历山大会沿着相反方向把战争重新打回亚洲。所以下一章亚历山大并不是突然从天而降，而是接住了这一章留下的东西方碰撞主线。')+h3('👤','关键人物')+ul(li('大流士一世','推动帝国对西部前线采取更积极战略的统治者'),li('米提亚德','马拉松战役中的雅典将领之一，象征希腊城邦的前线应对'),li('爱奥尼亚城邦精英','他们既在帝国内生存，也不断把帝国与希腊本土拖进冲突'))+h3('🗺','这张图怎么读')+ul(li('深紫色轮廓','表示波斯在安纳托利亚西部与爱琴海东缘的稳定控制区'),li('浅紫色轮廓','表示从苏萨到小亚细亚的帝国西向交通和统治空间'),li('蓝色虚线区','表示真正发生碰撞的海峡与爱琴海前线'),li('金色点','帝国决策中心或核心行省节点'),li('橙色点','前线枢纽与交通门户'),li('蓝色点','希腊世界关键方向或冲突触发点'))+h3('💡','这章真正留下了什么')+p('它留下的不是一句简单的“东方打西方”，而是一个更复杂的事实：中东帝国从这一刻起，已经不可能只在中东内部书写自己的历史。它的边界碰到了地中海，地中海也从此被卷进了中东政治。'),

alexander:h3('📜','历史背景')+p('亚历山大三世（BC356—BC323年），马其顿国王腓力二世之子，师从哲学家亚里士多德。BC336年腓力遇刺后，年仅20岁的亚历山大迅速平定内乱，随即发动了人类历史上最辉煌的征服战争。BC334年率约4万军队渡过赫勒斯滂海峡进入亚洲。')+h3('⚔️','东征历程')+p('格拉尼科斯河战役、伊苏斯战役（BC333年，击溃大流士三世本人）、高加米拉战役（BC331年，波斯帝国决定性崩溃）——三役奠定胜局。此后他征服埃及（建立亚历山大港）、攻克波斯波利斯，最远抵达今巴基斯坦。BC323年，在巴比伦病逝，年仅32岁。')+h3('🌍','希腊化时代')+p('亚历山大的征服创造了"希腊化时代"：希腊语成为从埃及到阿富汗的学术和外交通用语，持续约1000年。希腊文化与波斯、埃及、印度文化融合，为后来的罗马文化和基督教早期神学奠定基础。')+h3('👤','关键人物')+ul(li('亚历山大大帝','在位13年完成不可思议的征服，从未在战场上失败'),li('托勒密一世','将领之一，创立埃及托勒密王朝，直至克里奥帕特拉七世亡国'))+h3('🔗','与今日的联系')+p('亚历山大建立的亚历山大港至今仍是埃及第二大城市。中亚、阿富汗、巴基斯坦部分地区仍保存着希腊化风格的考古遗存（犍陀罗艺术）。'),

muhammad_birth:h3('📜','历史背景')+p('公元570年前后，阿拉伯半岛政治分裂，拜占庭和萨珊两大帝国从北方施压，半岛内部各部落以血亲复仇和袭掠为常态。麦加是商业重镇，卡巴圣殿供奉多达360个神祇。古莱氏部族控制麦加，是穆罕默德的家族所属部落。')+h3('🌙','先知生平')+p('穆罕默德约570年生于麦加，幼年失去父母，由祖父和叔父抚养。约610年，在麦加郊外希拉山洞独自冥想时，他声称接受了天使加百列的首次启示，此后23年持续接受《古兰经》的启示。622年因受迫害率穆斯林移居麦地那（圣迁，Hijra），这一年成为伊斯兰历元年。')+h3('🌍','深远影响')+p('穆罕默德所创立的伊斯兰教如今拥有约19亿信徒，是世界第二大宗教，也是增长最快的宗教。在他去世后百年内，伊斯兰文明已从西班牙延伸至中亚，彻底改变了世界历史格局。')+h3('👤','关键人物')+ul(li('穆罕默德','伊斯兰教先知与创始人，穆斯林认为他是真主派遣的最后先知'),li('哈蒂嘉','穆罕默德的第一任妻子，第一位接受伊斯兰教的人'),li('阿里·伊本·阿比·塔利卜','穆罕默德的堂弟兼女婿，什叶派认为他是合法的宗教继承人'))+h3('🔗','与今日的联系')+p('每年约200万穆斯林前往麦加朝圣（哈吉），是世界上最大的宗教聚会。围绕穆罕默德继承权问题的历史争议（逊尼派 vs. 什叶派）至今仍是中东政治冲突的深层宗教根源，体现在伊朗-沙特的战略对抗中。'),

umayyad:h3('📜','历史背景')+p('穆罕默德去世（632年）后，哈里发的继承问题立刻引发分裂。四大哈里发统治期间，伊斯兰军队以惊人速度征服了波斯、叙利亚、埃及等地，但内部矛盾激化。661年叙利亚总督穆阿维叶建立倭马亚王朝，首都迁往大马士革。')+h3('🌏','帝国扩张')+p('倭马亚王朝（661—750年）将伊斯兰帝国推向最大疆域：西至今西班牙和葡萄牙（711年渡过直布罗陀海峡），东至中亚和今巴基斯坦。帝国人口约6200万，面积约1100万平方公里，超过当时任何其他政权。')+h3('🌍','深远影响')+p('倭马亚时代奠定了伊斯兰帝国扩张的地理基础。然而其阿拉伯民族主义色彩引发波斯人强烈不满。750年阿拔斯革命推翻倭马亚，将伊斯兰政治重心东移至巴格达。')+h3('👤','关键人物')+ul(li('穆阿维叶一世','王朝创建者，将哈里发国从宗教性政体转向世俗帝国'),li('阿卜杜勒-马利克','建造耶路撒冷圆顶清真寺（688年），将阿拉伯语定为帝国行政语言'),li('塔里克·伊本·齐亚德','征服伊比利亚半岛（711年）的将军，直布罗陀以其名字命名'))+h3('🔗','与今日的联系')+p('西班牙格拉纳达的阿罕布拉宫、科尔多瓦大清真寺至今是伊斯兰艺术的顶峰之作。直布罗陀（阿拉伯语：塔里克之山）至今仍是英国海外领土，英西两国争议未决。'),

abbasid:h3('📜','历史背景')+p('公元750年，以先知穆罕默德叔父阿拔斯为名义领袖的反倭马亚革命爆发，得到伊朗东部波斯化穆斯林和什叶派广泛支持。阿拔斯王朝迁都巴格达（762年建城），历时约500年（750—1258年）。')+h3('🌟','伊斯兰黄金时代')+p('8至13世纪，巴格达成为世界上最大最繁荣的城市，人口峰值可能达150万。哈里发资助大规模"翻译运动"，将古希腊、波斯、印度典籍全面翻译为阿拉伯语。数学家花剌子模发明代数学（Algebra来自阿拉伯语al-jabr）；伊本·海赛姆奠定光学基础；伊本·西那（阿维森纳）的《医典》成为欧洲医学院教材使用超700年。')+h3('🌍','深远影响')+p('正是通过阿拉伯语翻译，古希腊的亚里士多德、欧几里得、盖伦才在欧洲黑暗时代没有失传，最终回流欧洲触发文艺复兴和科学革命。如果没有伊斯兰黄金时代这一知识"接力"，西方文明的发展将至少推迟数百年。')+h3('👤','关键人物')+ul(li('哈伦·拉希德','最著名的阿拔斯哈里发，《一千零一夜》中的传奇君主'),li('马蒙','建立智慧宫，主导翻译运动的哈里发'),li('花剌子模','代数学和算法之父，algebra、algorithm两词均源于他的名字'))+h3('🔗','与今日的联系')+p('"algebra""algorithm""alcohol""alchemy""almanac"——现代科学技术词汇中大量阿拉伯语来源词，是这段历史最活生生的遗产。今天伊拉克的首都巴格达，正是当年智慧宫所在地。'),

crusaders:h3('📜','历史背景')+p('11世纪末，塞尔柱突厥人的扩张威胁了拜占庭帝国，皇帝阿列克修斯一世向西方求援。1095年，教皇乌尔班二世在克莱蒙会议上号召基督徒武装收复耶路撒冷，对欧洲封建贵族而言，十字军既是宗教义务，也是获取土地和荣耀的机会。')+h3('⚔️','攻占与屠城')+p('1099年7月15日，十字军攻破耶路撒冷，随即对穆斯林和犹太居民进行大规模屠杀。十字军随后建立了耶路撒冷王国、安条克公国等，共约200年在黎凡特维持统治。1187年，萨拉丁在哈廷战役全歼十字军主力，随后宽容地收复耶路撒冷，与1099年的大屠杀形成鲜明对比。')+h3('🌍','深远影响')+p('十字军东征深刻改变了基督教世界与伊斯兰世界的关系，留下持续至今的互相敌视记忆。讽刺的是，它也推动了文化交流：欧洲人从中东学到了代数、医学、哲学和香料。"十字军"一词在当代中东政治话语中仍是高度敏感的词汇。')+h3('👤','关键人物')+ul(li('戈弗雷·德·布永','攻克耶路撒冷后的首任基督教统治者，自称"圣墓卫士"'),li('萨拉丁','1187年重夺耶路撒冷的库尔德族穆斯林将领，以骑士精神著称'),li('狮心王理查','第三次十字军的英格兰国王，与萨拉丁僵持不下'))+h3('🔗','与今日的联系')+p('耶路撒冷古城至今仍是争议焦点。以色列和巴勒斯坦都宣称其为首都，美国2018年将大使馆迁往耶路撒冷，引发伊斯兰世界强烈抗议。'),

mongols_baghdad:h3('📜','历史背景')+p('成吉思汗建立蒙古帝国后，其孙旭烈兀奉命西征。当时的阿拔斯哈里发穆斯台绥木性格软弱，拒绝了蒙古军臣服要求，且未能有效组织防御。')+h3('💀','洗劫巴格达')+p('1258年2月10日，旭烈兀的蒙古军队攻入巴格达城，为期13天的大屠杀开始。史料记载死亡人数从8万到80万不等，现代学者估计约10至20万。哈里发被用毛毡卷起踩死。图书馆的典籍被投入底格里斯河，据说河水被墨汁染黑。巴格达500年哈里发国就此终结。')+h3('🌍','深远影响')+p('这一事件被伊斯兰世界视为历史上最大的文明创伤之一。大量无可替代的知识和文化遗产永久消失。蒙古入侵还破坏了灌溉系统，两河流域农业从此一蹶不振。埃及马穆鲁克王朝于1260年在艾因贾鲁特击败蒙古军，成为阻挡蒙古西进的最后防线。')+h3('👤','关键人物')+ul(li('旭烈兀汗','成吉思汗之孙，西征的蒙古统帅，后建立伊利汗国'),li('穆斯台绥木','阿拔斯末代哈里发，以软弱无能著称，悲剧性地成为一个时代的终点'))+h3('🔗','与今日的联系')+p('2003年美国入侵伊拉克后，巴格达国家博物馆再次遭到洗劫，珍贵文物流失，被学者称为"第二次巴格达之劫"。历史的轮回令人唏嘘。'),

ottoman_conquest:h3('📜','历史背景')+p('东罗马帝国（拜占庭）到15世纪已是强弩之末，疆域仅剩君士坦丁堡及周边地区。年仅21岁的苏丹穆罕默德二世即位后，以征服拜占庭为最高使命，秘密准备约两年，委托匈牙利工程师设计了当时世界上最大的攻城炮——"巴西里卡"（发射630公斤石弹）。')+h3('⚔️','攻城奇谋')+p('1453年4月6日，约8万奥斯曼军队开始围攻仅剩约7000守军的君士坦丁堡。关键突破在于：穆罕默德命令士兵将72艘战船拖过陆地，绕过守军的铁链封锁，进入金角湾。5月29日，城墙被轰破，最后一位拜占庭皇帝君士坦丁十一世冲入乱军战死，尸体再未被找到。')+h3('🌍','深远影响')+p('君士坦丁堡的陷落标志着长达1000年的东罗马帝国终结。大批拜占庭学者携带古希腊典籍逃往意大利，直接刺激了文艺复兴。东西方贸易中间人拜占庭的消失，迫使欧洲商人寻找新航路，哥伦布、达伽马的大航海因此成为历史的必然。')+h3('👤','关键人物')+ul(li('穆罕默德二世（征服者）','会说七种语言、热爱哲学和艺术的苏丹，一生最大愿望是建立横跨欧亚的大帝国'),li('君士坦丁十一世','最后的拜占庭皇帝，以殉国方式成就了帝国最悲壮的结局'))+h3('🔗','与今日的联系')+p('圣索菲亚大教堂1934年被土耳其共和国改为博物馆，2020年再次改为清真寺。这一举动引发希腊、欧盟和美国强烈抗议，历史的回声跨越五个世纪依然清晰。'),

sykes_picot:h3('📜','历史背景')+p('第一次世界大战期间，奥斯曼帝国加入同盟国一方，英法两国开始秘密谈判瓜分奥斯曼帝国战败后的遗产。与此同时，英国高级专员麦克马洪正以书信承诺阿拉伯谢里夫侯赛因：如果阿拉伯人起义反抗奥斯曼，战后将得到独立的阿拉伯国家。')+h3('📋','协议内容')+p('1916年5月，英国外交官马克·赛克斯和法国外交官弗朗索瓦·皮科秘密签署协议，将奥斯曼阿拉伯领土一分为二：法国获得今叙利亚和黎巴嫩；英国获得今伊拉克和约旦、科威特；巴勒斯坦由国际共管。协议完全无视了当地阿拉伯、库尔德、亚美尼亚人的民族诉求，在地图上用直尺和铅笔画出了跨越部落、教派界限的人工国界。')+h3('🌍','深远影响')+p('赛克斯-皮科协议被广泛视为中东百年乱局的源头之一。人工划定的国界将同一部落分属不同国家（库尔德人被分割于土耳其、伊拉克、叙利亚、伊朗之间）。后来的伊拉克逊尼-什叶-库尔德三角矛盾、叙利亚内战、黎巴嫩宗教冲突，都与这一历史切割直接相关。')+h3('👤','关键人物')+ul(li('马克·赛克斯','英国外交官和政客，赛克斯-皮科线的英方绘制者'),li('弗朗索瓦·乔治-皮科','法国外交官，法方绘制者'),li('法萨尔·伊本·侯赛因','领导阿拉伯起义的王子，被法国从叙利亚驱逐，改置为伊拉克国王'))+h3('🔗','与今日的联系')+p('叙利亚内战（2011年—）造成的国家崩溃、伊拉克的反复动乱、库尔德人的独立诉求——这一切都可以追溯至1916年那张地图。IS极端组织2014年宣称"废除赛克斯-皮科"，在两国边境推土机推平界碑的视频广泛传播。'),

israel_1948:h3('📜','历史背景')+p('二战大屠杀（Holocaust）使欧洲600万犹太人罹难，极大增强了国际社会对犹太人建立国家的同情。1947年，英国将巴勒斯坦问题移交联合国，联大181号决议通过"分治方案"，将巴勒斯坦分为犹太国（56%）和阿拉伯国（44%）。阿拉伯方面拒绝接受。')+h3('⚔️','建国与战争')+p('1948年5月14日，本-古里安宣布以色列国成立。次日，埃及、约旦、叙利亚、伊拉克、黎巴嫩联合向以色列宣战。以色列最终控制了约78%的巴勒斯坦土地。约70至75万巴勒斯坦阿拉伯人在战争中逃离或被驱逐，他们称之为"纳克巴"（Nakba，灾难）——这一流离失所的历史是今日巴以冲突的情感核心。')+h3('🌍','深远影响')+p('以色列建国与巴勒斯坦纳克巴，是现代中东政治最核心的历史事件。围绕这一事件的叙事之争体现了历史叙事本身就是政治斗争的一部分。此后70多年，巴以冲突持续影响整个中东格局。')+h3('👤','关键人物')+ul(li('大卫·本-古里安','以色列建国总理，务实而强硬的政治家，被称为"以色列国父"'),li('阿卜杜勒-卡迪尔·侯赛尼','最重要的巴勒斯坦抵抗指挥官，1948年战争中阵亡'))+h3('🔗','与今日的联系')+p('2023年爆发的加沙战争，是1948年以来最激烈的一轮冲突。约600万巴勒斯坦难民及其后代至今流离失所。"两国方案"在国际社会名义上仍是共识，但在现实中正在快速消亡。'),

war_1967:h3('📜','历史背景')+p('1967年前，中东局势持续紧张：叙利亚支持的巴勒斯坦武装多次袭击以色列；纳赛尔宣布封锁亚喀巴湾出海口（以色列视为战争行为），并要求联合国紧急部队撤出西奈。以色列内阁判断，等待意味着战略优势的消失，决定先发制人。')+h3('⚔️','六日战争')+p('1967年6月5日，以色列空军对埃及、叙利亚、约旦的空军基地发动突然袭击，在约3小时内摧毁近450架阿拉伯飞机（大多仍在地面），取得绝对制空权。随后地面部队迅速推进：6天之内，以色列占领西奈半岛、约旦河西岸和耶路撒冷旧城、戈兰高地，土地面积增加三倍以上。')+h3('🌍','深远影响')+p('六日战争彻底重塑了中东政治版图。约100万巴勒斯坦人口的约旦河西岸和加沙地带落入以色列占领之下，后来成为被占领土和巴勒斯坦建国运动的核心争议地带。埃及和叙利亚的失败使泛阿拉伯民族主义开始走向衰落，伊斯兰主义开始作为替代意识形态崛起。')+h3('👤','关键人物')+ul(li('摩西·达扬','以色列国防部长，黑色眼罩的标志性形象，六日战争的战略主导者'),li('纳赛尔','失败后宣布辞职，却被数百万埃及人自发上街挽留，但其阿拉伯主义声望从此一落千丈'))+h3('🔗','与今日的联系')+p('西岸目前有超过70万以色列定居者居住，国际法将定居点定性为非法。加沙地带自2007年由哈马斯控制，被以色列和埃及封锁。2023年加沙战争的根源，正是在这片1967年被占领的土地上，57年来矛盾的持续积累。'),

iran_revolution:h3('📜','历史背景')+p('巴列维王朝推行"白色革命"现代化改革，但以残酷的秘密警察萨瓦克（SAVAK）镇压异见。石油财富的不公分配、西化政策对伊斯兰传统的冲击、政治腐败，使城市中产、传统商人阶层和伊斯兰神职人员广泛结盟反对国王。流亡法国的霍梅尼通过录音磁带将演讲传播至伊朗各地，成为精神领袖。')+h3('🌙','革命经过')+p('1978年一系列示威游行使局势急转直下。1979年1月16日沙阿出走"度假"（从未回国），2月1日霍梅尼从法国乘机回国，受到数百万人夹道欢迎。2月11日军事政权瓦解，伊朗成为全球第一个现代意义上的伊斯兰共和国。')+h3('🌍','深远影响')+p('伊朗伊斯兰革命向全球穆斯林证明了伊斯兰主义可以推翻亲西方政权。同年苏联入侵阿富汗，美国支持包括本·拉登在内的圣战组织——两大事件共同塑造了此后三十年的全球恐怖主义地理。')+h3('👤','关键人物')+ul(li('鲁霍拉·霍梅尼','革命领袖和最高领袖，将什叶派神学理论"法基赫统治"付诸实践'),li('穆罕默德·礼萨·沙阿','被推翻的国王，一位真正的现代化改革者，却以独裁方式推行改革而自食恶果'))+h3('🔗','与今日的联系')+p('伊朗核计划是当代中东最危险的不稳定因素之一。美国2018年单方面退出伊核协议，随后制裁使伊朗经济遭受重创，但伊朗核能力不降反升。"伊朗威胁"成为以色列与阿拉伯海湾国家罕见合作的共同基础，直接促成了2020年《亚伯拉罕协议》。'),

sept11:h3('📜','历史背景')+p('基地组织由奥萨马·本·拉登于1988年在阿富汗建立，最初是反苏联圣战运动的产物。本·拉登将矛头转向美国的核心原因包括：美军在沙特的长期驻扎（被视为亵渎圣地）、美国对以色列的坚定支持、以及对伊拉克的制裁。整个1990年代，基地组织策划了一系列袭击为2001年铺垫。')+h3('💥','9·11事件')+p('2001年9月11日上午，19名劫机者分别劫持4架客机。两架撞入纽约世界贸易中心双塔，一架撞入五角大楼，第四架因乘客反抗在宾夕法尼亚州坠毁。双塔相继倒塌，约2977名无辜者罹难。美国随即宣布"反恐战争"，10月7日入侵阿富汗。')+h3('🌍','深远影响')+p('《爱国者法案》大幅扩大政府监控权限；全球航空安检彻底重塑；穆斯林群体在西方遭受广泛歧视。2003年，布什政府借反恐战争余威入侵伊拉克，进一步重塑整个中东格局。')+h3('👤','关键人物')+ul(li('奥萨马·本·拉登','袭击策划者，沙特富商之子，2011年在巴基斯坦被美军击毙'),li('乔治·W.布什','袭击发生时的美国总统，宣布"反恐战争"，决策对后来20年的中东产生深远影响'))+h3('🔗','与今日的联系')+p('2021年，美国从阿富汗完全撤军，塔利班重掌政权，与2001年美军进入时几乎别无二致。20年战争，2.3万亿美元，数万人命，结局令人唏嘘。9·11也永久改变了西方社会对隐私权、政府权力和伊斯兰世界的认知。'),

iraq_war:h3('📜','历史背景')+p('2001年9·11后，布什政府将伊拉克纳入"邪恶轴心"，指控其拥有大规模杀伤性武器（WMD）并与基地组织有联系。2003年2月，美国国务卿科林·鲍威尔在联合国安理会展示"证据"——后来证明全部是伪造或误读的情报。法国、德国、俄罗斯反对军事行动，联合国未授权，美国仍于2003年3月20日发动入侵。')+h3('⚔️','战争与后果')+p('三周内，美英联军攻克巴格达，萨达姆政权崩溃。随后未找到任何大规模杀伤性武器。美国占领当局下令解散伊拉克军队，制造了数十万失业、带枪的士兵，这直接成为激进武装的兵源库，IS由此而来。约15至20万伊拉克平民死亡，美国花费约2万亿美元。')+h3('🌍','深远影响')+p('伊拉克战争引发长期动乱：权力真空导致基地组织伊拉克分支兴起，演变为IS；伊朗趁机扩大在伊拉克的影响力；美国软实力大幅下降，"美国式民主输出"理念在全球范围信誉受损。')+h3('👤','关键人物')+ul(li('乔治·W.布什','决策者，将"反恐战争"扩展至伊拉克，争议至今'),li('萨达姆·侯赛因','被俘后以人道罪被判处绞刑（2006年），但其倒台留下的权力真空比他的统治更具破坏性'))+h3('🔗','与今日的联系')+p('今日伊拉克以三个政治实体的形态运作：南部什叶派（与伊朗密切）、中部逊尼派（曾产生IS）、北部库尔德自治区。IS于2014至2019年控制大片领土，之后虽被击败但转入地下，伊拉克的稳定始终脆弱。'),

arab_spring:h3('📜','历史背景')+p('2010年12月17日，突尼斯26岁的街头小贩穆罕默德·布阿齐兹，因被城管没收果摊并遭当众扇耳光，在市政厅门口自焚。这一绝望的抗议行为迅速点燃整个阿拉伯世界。阿拉伯之春背后是几十年的积怨：威权腐败、青年失业（平均30%以上）、不平等加剧、网络社交媒体打破信息封锁。')+h3('🌐','各国命运')+p('突尼斯：本·阿里流亡沙特，是阿拉伯之春中唯一实现民主转型的案例，但成果岌岌可危。埃及：穆巴拉克在解放广场示威后下台，穆斯林兄弟会赢得选举，2013年被军队推翻，塞西上台比穆巴拉克更为威权。利比亚：卡扎菲被NATO空袭支持的反对派击杀，随后陷入持续内战。叙利亚：阿萨德以武力和化武镇压，内战延续超过13年，50万人死亡，1200万人流离失所。')+h3('🌍','深远影响')+p('阿拉伯之春揭示了中东威权政府的内在脆弱性，但同时证明了"推翻独裁者"与"建立民主"之间存在巨大鸿沟。叙利亚难民危机深刻影响了欧洲政治，推动了各国民族主义和反移民政党的兴起。')+h3('👤','关键人物')+ul(li('穆罕默德·布阿齐兹','无意间点燃阿拉伯之春的突尼斯小贩，其绝望之举成为一个时代的象征'),li('胡斯尼·穆巴拉克','执政30年的埃及总统，在示威压力下黯然下台'))+h3('🔗','与今日的联系')+p('叙利亚内战于2024年底在反对派进攻下，阿萨德政权轰然倒塌，但未来走向仍充满不确定性。突尼斯民主成果在2021年总统抓权后岌岌可危，阿拉伯之春的遗产依然扑朔迷离。'),

isis:h3('📜','历史背景')+p('IS（伊斯兰国）的前身是2003年伊拉克战争后兴起的"基地伊拉克"。其领袖阿布·巴克尔·巴格达迪曾被美军关押于布卡营。2011年叙利亚内战爆发为IS提供了扩张空间；2014年6月，IS攻占摩苏尔（伊拉克第二大城市），3万伊拉克政府军闻风溃逃——这是21世纪军事史上最大的溃败之一。')+h3('☠️','哈里发国的建立与崩溃')+p('2014年6月，巴格达迪在摩苏尔大清真寺宣布建立"伊斯兰哈里发国"，要求全球穆斯林效忠。全盛期控制叙伊两国约8.8万平方公里土地，人口约800万。IS以极端暴力著称：斩首外国人质视频全球传播、活埋雅兹迪男性和奴役女性（种族灭绝）、摧毁帕尔米拉等世界文化遗产。2019年，IS"哈里发国"在巴格胡兹被彻底消灭，巴格达迪在美军突袭中自爆身亡。')+h3('🌍','深远影响')+p('IS在全球范围内激发了圣战"独狼"袭击，2015至2017年欧洲多个城市遭受恐袭，造成数百人死亡。大规模难民潮涌入欧洲，触发欧洲移民危机和民粹主义政治的崛起。')+h3('👤','关键人物')+ul(li('阿布·巴克尔·巴格达迪','IS最高领袖，伊斯兰学博士，将极端宗教知识与冷酷军事战略结合，2019年被击毙'))+h3('🔗','与今日的联系')+p('IS的"呼罗珊省"（IS-K）在阿富汗持续活动，在非洲萨赫勒地区的IS分支仍频繁发动袭击。IS的意识形态未随哈里发国的崩溃而消亡，只是换了面孔继续存在。'),

gaza_2023:h3('📜','历史背景')+p('加沙地带面积约365平方公里，约230万人口生活在类似"露天监狱"的封锁中（以色列和埃及封锁始于2007年哈马斯夺权）。2006年哈马斯赢得巴勒斯坦立法选举，随后控制加沙。此后16年，加沙经历了多轮冲突，人道主义状况持续恶化，失业率超过50%。')+h3('⚔️','2023年10月7日与战争')+p('2023年10月7日清晨，哈马斯突破围栏发动突然袭击，造成约1200名以色列人死亡（以色列历史上单日最多）、约250名人质被带入加沙。以色列随即宣布进入战争状态，发动大规模军事行动。截至2024年底，加沙已有超过4.5万人死亡（联合国数据），170万人流离失所，大量民用基础设施被摧毁，人道主义危机达到空前严峻程度。')+h3('🌍','深远影响')+p('这场战争引发了二战后西方国家内部最大规模的舆论分裂。南非代表巴勒斯坦在国际法院对以色列提出种族灭绝指控，国际刑事法院对内塔尼亚胡发出逮捕令（2024年）。')+h3('👤','关键人物')+ul(li('本杰明·内塔尼亚胡','以色列总理，面对司法腐败指控和内部政治危机，将战争延续定为政治优先'),li('叶海亚·辛瓦尔','10月7日袭击的主要策划者，2024年被击毙'),li('安东尼奥·古特雷斯','联合国秘书长，多次谴责平民伤亡，被以色列宣布为"不受欢迎的人"'))+h3('💡','历史意义')+p('2023至2024年的加沙战争是21世纪国际人道主义法、大国政治双重标准和全球南方-全球北方价值观分歧最尖锐的试验场，其全面历史后果尚难评估。')+h3('🔗','与今日的联系')+p('这场冲突仍在持续，停火谈判多次破裂。整个中东的稳定前景——伊朗、黎巴嫩、也门、叙利亚——都与加沙战争的最终走向密切相关。这是一场没有简单答案的冲突，其历史评价必将延续数十年。'),
};

  world:{tag:'全球市场',title:'能源与航运风险上升',desc:'霍尔木兹海峡和地区基地安全重新牵动全球能源、保险和市场预期',rid:null,dk:null}},
];

const eraLabels={ancient:'🏛 古代文明  BC 3500–AD 200',classical:'⚔️ 古典时代  BC 500–AD 400',islamic:'🌙 伊斯兰兴起  AD 570–850',medieval:'🗡 中世纪  AD 900–1400',ottoman:'☪️ 奥斯曼帝国  AD 1453–1918',modern:'🔥 近现代  1916–1989',contemporary:'🌐 当代  1990–今'};
let rowObserver=null;
let leafletMap=null;
let mapLayers=[];
function escapeInlineArg(value){return String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,' ');}

// ═══ BUILD TIMELINE ═══
function buildTimeline(activeEra){
  const container=document.getElementById('timeline');
  container.innerHTML='';
  [...new Set(events.map(e=>e.era))].forEach(era=>{
    if(activeEra!=='all'&&activeEra!==era)return;
    const block=document.createElement('div');
    block.innerHTML=`<div class="era-header"><div class="era-badge">${eraLabels[era]}</div></div>`;
    events.filter(e=>e.era===era).forEach((ev,i)=>{
      const row=document.createElement('div');
      row.className='event-row';
      row.style.animationDelay=`${i*70}ms`;
      const dc=(ev.me&&ev.world)?'both':(!ev.me?'wo':'');
      const meTag=escapeInlineArg(ev.me?.tag||'');
      const meTitle=escapeInlineArg(ev.me?.title||'');
      const worldTag=escapeInlineArg(ev.world?.tag||'');
      const worldTitle=escapeInlineArg(ev.world?.title||'');
      const meCard=ev.me?`<div class="event-card me">
        <div class="card-inner">
          <div class="card-tag">${ev.me.tag}</div>
          <div class="card-title">${ev.me.title}</div>
          ${ev.me.meta?`<div class="card-meta">${ev.me.meta}</div>`:''}
          <div class="card-desc">${ev.me.desc}</div>
          <div class="card-actions">
            ${ev.me.rid?`<button class="act-btn map-btn" onclick="openMap('${ev.me.rid}',event)">🗺 地图</button>`:''}
            ${ev.me.dk?`<button class="act-btn dtl-btn" onclick="openDetail('${meTag}','${meTitle}','${ev.year}','${ev.me.dk}',event)">📖 详情</button>`:''}
          </div>
        </div></div>`:'<div class="event-card empty"></div>';
      const weCard=ev.world?`<div class="event-card we">
        <div class="card-inner">
          <div class="card-tag">${ev.world.tag}</div>
          <div class="card-title">${ev.world.title}</div>
          <div class="card-desc">${ev.world.desc}</div>
          <div class="card-actions">
            ${ev.world.rid?`<button class="act-btn map-btn" onclick="openMap('${ev.world.rid}',event)">🗺 地图</button>`:''}
            ${ev.world.dk?`<button class="act-btn dtl-btn" onclick="openDetail('${worldTag}','${worldTitle}','${ev.year}','${ev.world.dk}',event)">📖 详情</button>`:''}
          </div>
        </div></div>`:'<div class="event-card empty"></div>';
      row.innerHTML=`<div>${meCard}</div><div class="event-node"><div class="node-year">${ev.yearShort}</div><div class="node-dot ${dc}"></div></div><div>${weCard}</div>`;
      block.appendChild(row);
    });
    container.appendChild(block);
  });
  if(rowObserver)rowObserver.disconnect();
  rowObserver=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:0.1});
  document.querySelectorAll('.event-row').forEach(r=>rowObserver.observe(r));
}

// ═══ MAP ═══
function ensureMap(){
  if(leafletMap)return;
  leafletMap=L.map('theMap',{zoomControl:true}).setView([31.5,46],6);
  L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&hl=zh-CN&x={x}&y={y}&z={z}',{
    subdomains:['0','1','2','3'],
    attribution:'© Google Maps',
    maxZoom:18
  }).addTo(leafletMap);
}

function clearMapLayers(){
  mapLayers.forEach(layer=>leafletMap.removeLayer(layer));
  mapLayers=[];
}

function openMap(rid,evt){
  if(evt)evt.stopPropagation();
  const region=R[rid];
  if(!region)return;
  const POINT_STYLES={
    core:{radius:7,color:'#fff',weight:2,fillColor:'#E8B84B',fillOpacity:.95},
    gateway:{radius:7,color:'#fff',weight:2,fillColor:'#D98324',fillOpacity:.95},
    neighbor:{radius:6,color:'#fff',weight:2,fillColor:'#5DA9E9',fillOpacity:.95},
    sacred:{radius:6,color:'#fff',weight:2,fillColor:'#A87DFF',fillOpacity:.95}
  };
  const pointLegendDefault={
    core:'重要城市 / 核心节点',
    gateway:'关键枢纽',
    neighbor:'周边互动中心',
    sacred:'宗教中心'
  };
  document.getElementById('mapTitle').textContent=region.name;
  document.getElementById('mapSubtitle').textContent=`历史疆域示意图 · ${region.note} · 底图：Google 地图当代国界与地名`;
  document.getElementById('mapModal').classList.add('open');
  ensureMap();
  clearMapLayers();
  let displayBounds=null;
  const usedPointKinds=new Set();
  if(region.polys){
    region.polys.forEach(poly=>{
      const layer=L.polygon(poly.pts,{
        color:poly.col,
        weight:poly.weight??2.5,
        opacity:poly.opacity??.9,
        fillColor:poly.col,
        fillOpacity:poly.fillOpacity??.32,
        dashArray:poly.dashArray||null
      }).addTo(leafletMap);
      layer.bindTooltip(poly.lbl,{permanent:false,direction:'center',className:'leaflet-tooltip'});
      mapLayers.push(layer);
      displayBounds=displayBounds?displayBounds.extend(layer.getBounds()):layer.getBounds();
    });
  }
  if(region.pts){
    region.pts.forEach(rawPoint=>{
      const point=Array.isArray(rawPoint)?{lat:rawPoint[0],lng:rawPoint[1],label:rawPoint[2],kind:'core'}:rawPoint;
      const kind=point.kind||'core';
      usedPointKinds.add(kind);
      const marker=L.circleMarker([point.lat,point.lng],POINT_STYLES[kind]||POINT_STYLES.core).addTo(leafletMap);
      marker.bindTooltip(point.label,{permanent:false,direction:'top',className:'leaflet-tooltip'});
      mapLayers.push(marker);
      displayBounds=displayBounds?displayBounds.extend([point.lat,point.lng]):L.latLngBounds([[point.lat,point.lng]]);
    });
  }
  const polyLegend=region.polys?'<h4>历史疆域图例</h4>'+region.polys.map(poly=>`<div class="leg-item"><div class="leg-swatch" style="background:${poly.col}55;border:2px solid ${poly.col}"></div>${poly.lbl}</div>`).join(''):'';
  const pointLegendItems=(region.pointLegend&&region.pointLegend.length?region.pointLegend:Array.from(usedPointKinds).map(kind=>({kind,label:pointLegendDefault[kind]||'关键点位'})))
    .map(item=>{
      const style=POINT_STYLES[item.kind]||POINT_STYLES.core;
      return `<div class="leg-item"><div class="leg-swatch" style="width:${(style.radius||6)*1.5}px;height:${(style.radius||6)*1.5}px;border-radius:50%;background:${style.fillColor};border:2px solid ${style.color}"></div>${item.label}</div>`;
    }).join('');
  const pointLegend=pointLegendItems?`<div style="margin-top:10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.75">主要点位</div>${pointLegendItems}`:'';
  document.getElementById('mapLegend').innerHTML=polyLegend+pointLegend+'<div class="leg-item" style="margin-top:10px;opacity:.6;font-size:10px;border-top:1px solid rgba(201,147,42,.2);padding-top:8px">注意：轮廓展示的是历史势力空间 / 互动范围，不等于现代国界</div>'+'<div class="leg-item" style="margin-top:4px;opacity:.5;font-size:10px">底图：Google 地图当代国界·城市·地名</div>';
  setTimeout(()=>{
    leafletMap.invalidateSize();
    if(region.boundsMode==='fit'&&displayBounds&&displayBounds.isValid()){
      leafletMap.fitBounds(displayBounds.pad(region.padRatio??0.06),{padding:[22,22],maxZoom:region.zoom||7,animate:true,duration:1.2});
    }else{
      leafletMap.flyTo(region.center,region.zoom,{duration:1.2});
    }
  },100);
}

function closeMap(){document.getElementById('mapModal').classList.remove('open');}


// ═══ DETAIL PANEL ═══
function openDetail(tag,title,year,dk,evt){
  evt&&evt.stopPropagation();
  document.getElementById('detailTag').textContent=tag;
  document.getElementById('detailHeadTitle').textContent=title;
  document.getElementById('detailYear').textContent=year;
  document.getElementById('detailBody').innerHTML=getDetail(dk);
  document.getElementById('detailModal').classList.add('open');
}
function closeDetail(){document.getElementById('detailModal').classList.remove('open');}
function maybeCloseDetail(evt){if(evt.target===document.getElementById('detailModal'))closeDetail();}

// ═══ FILTER ═══
document.getElementById('filterBar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTimeline(btn.dataset.era);
  window.scrollTo({top:200,behavior:'smooth'});
});

document.getElementById('mapModal').addEventListener('click',evt=>{if(evt.target===evt.currentTarget)closeMap();});
document.addEventListener('keydown',evt=>{
  if(evt.key!=='Escape')return;
  if(document.getElementById('detailModal').classList.contains('open')){closeDetail();return;}
  if(document.getElementById('mapModal').classList.contains('open'))closeMap();
});

buildTimeline('all');
</script>
